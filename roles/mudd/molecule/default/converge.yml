---
- name: Converge
  hosts: all
  pre_tasks:
  - name: update cache
    apt:
      update_cache: true
      cache_valid_time: 600
  - name: install iproute
    apt:
      name: iproute2
      state: present
  - name: rerun setup
    setup:
      gather_subset:
        - network
  vars:
    - running_on_server: false
    - node_identifier: 1
    - passenger_listen_port: '8080'
    - rails_app_directory: 'mudd'
    - rails_app_name: 'mudd'
  become: true
  tasks:
    - name: "Include example"
      include_role:
        name: postgresql
    - name: "Include example"
      include_role:
        name: mudd
