---
# tasks file for roles/pulibrary.certcheck
- name: certcheck | ensure whenever gem is installed globally
  gem:
    name: whenever
    user_install: false

- name: certcheck | ensure whenever directory
  file:
    path: "/home/{{ deploy_user }}/.lib/whenever/config"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    state: directory

- name: certcheck | Generate whenever cron job file
  template:
    src: schedule.rb.j2
    dest: "/home/{{ deploy_user }}/.lib/whenever/config/schedule.rb"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "u+rwx,g+rx,o+rx"

- name: certcheck | Whenever update crontab
  command: whenever --update-crontab
  register: whenever_update_crontab
  become: true
  become_user: "{{ deploy_user }}"

- debug:
    var: whenever_update_crontab
