---
# tasks file for roles/pulibrary.docker_ce
- name: docker_ce | adjust max map count
  sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present

- name: docker_ce | adjust fs_notify
  sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    state: present

- name: docker_ce | add apt keys
  apt_key:
    url: "{{ docker_ce_apt_key_url }}"
    state: present
  notify:
    - apt update cache

- name: docker_ce | install docker_ce repository for apt
  apt_repository:
    repo: "{{ docker_ce_apt_repository_repo }}"
    state: present
  notify:
    - apt update cache

- name: docker_ce | add docker group
  group:
    name: docker
    state: present
    system: true

- name: docker_ce | add docker user
  user:
    name: docker
    group: docker
    state: present
    system: true

- name: docker_ce | install docker_ce
  package:
    name: "{{ docker_ce_packages }}"
    state: present
  register: docker_ce_install_docker_ce
  until: docker_ce_install_docker_ce is succeeded

- name: docker_ce | start and enable docker_ce
  service:
    name: "{{ docker_ce_service }}"
    state: started
    enabled: true

- name: docker_ce | Fetch docker compose
  get_url:
    url: "{{ docker_compose_binary_url }}"
    dest: "{{ docker_compose_path }}"
    mode: 0755
    owner: "{{ docker_compose_user }}"
    group: "{{ docker_compose_group }}"
