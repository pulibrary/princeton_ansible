---
scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
platforms:
  - name: instance
    image: "ghcr.io/pulibrary/vm-builds/ubuntu-22.04"
    platform: linux/amd64
    command: "" # image above already has the /sbin/init
    networks:
      - name: CI
        aliases:
          - instance
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
  - name: postgres
    image: "ghcr.io/pulibrary/vm-builds/ubuntu-22.04"
    platform: linux/amd64
    command: "" # image above already has the /sbin/init
    networks:
      - name: CI
        aliases:
          - postgres
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    create: create.yml
    destroy: destroy.yml
  # inventory:
  config_options:
    defaults:
      remote_tmp: /tmp
  log: true
verifier:
  name: ansible
