---
- name: Prepare Postgres Database Server
  hosts: postgres
  become: true
  vars_files:
    - ../../defaults/main.yml
  tasks:
    - name: Assert postgres molecule host is amd64
      ansible.builtin.assert:
        that:
          - ansible_architecture == postgres_supported_architecture
        fail_msg: >-
          The psql-client Molecule scenario only supports amd64 containers.
          This container reports {{ ansible_architecture }}.

    - name: Make sure CA certificates and curl are available
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Ensure PostgreSQL apt key directory exists
      ansible.builtin.file:
        path: "{{ postgres_apt_key_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Install PostgreSQL apt repository key
      ansible.builtin.get_url:
        url: "{{ postgres_apt_key_url }}"
        dest: "{{ postgres_apt_key_path }}"
        mode: "0644"

    - name: Configure PostgreSQL apt repository for amd64
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pgdg.sources
        mode: "0644"
        content: |
          Types: {{ postgres_apt_source_types }}
          URIs: {{ postgres_apt_repository_uri }}
          Suites: {{ ansible_distribution_release }}-pgdg
          Architectures: {{ postgres_apt_architecture }}
          Components: {{ postgres_apt_components }}
          Signed-By: {{ postgres_apt_key_path }}

    - name: Install PostgreSQL server for Molecule test fixture
      ansible.builtin.apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - "postgresql-contrib-{{ postgres_version }}"
          - "postgresql-client-{{ postgres_version }}"
          - libpq-dev
          - python3-psycopg2
          - sudo
        state: present
        update_cache: true

    - name: Install psycopg2 for Ansible Python
      ansible.builtin.pip:
        name: psycopg2-binary
        executable: pip3
        extra_args: --break-system-packages

    - name: Listen on all container addresses
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
        regexp: '^#?listen_addresses\s*='
        line: "listen_addresses = '*'"

    - name: Allow password auth from Molecule containers
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        line: "host    all             all             0.0.0.0/0               md5"

    - name: Start postgresql service
      ansible.builtin.service:
        name: postgresql
        state: restarted
        enabled: true

    - name: Set postgres user password for testing
      become_user: postgres
      ansible.builtin.command: psql -c "ALTER USER postgres PASSWORD 'postgres';"
      changed_when: false

- name: Prepare Application Instance
  hosts: instance
  become: true
  tasks:
    - name: Ensure deploy user exists
      ansible.builtin.user:
        name: deploy
        state: present
