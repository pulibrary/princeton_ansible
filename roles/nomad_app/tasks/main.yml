---
- name: Nomad App | configure postgres
  when:
    - db_user is defined 
    - db_host is defined
    - db_admin_user is defined
    - db_name is defined
    - db_password is defined
    - running_on_server
  block:
    - name: Nomad App | Postgresql | Create User
      community.postgresql.postgresql_user:
        name: '{{ db_user }}'
        password: '{{ db_password }}'
        encrypted: true
        state: 'present'
      delegate_to: '{{ db_host }}'
      become: true
      become_user: '{{ db_admin_user }}'
      run_once: true
    - name: Nomad App | Postgresql | Create Database
      community.postgresql.postgresql_db:
        name: '{{ db_name }}'
        encoding: 'UTF-8'
        state: 'present'
        owner: "{{ db_user }}"
      delegate_to: '{{ db_host }}'
      become: true
      become_user: '{{ db_admin_user }}'
      run_once: true
    - name: 'Nomad App | Postgresql | ensure all nomad clients are in pg_hba'
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        line: "host  all  all  {{ item }} md5"
      delegate_to: "{{ db_host }}"
      run_once: true
      loop: "{{ groups['nomad_clients_production_staging'] }}"
      when:
        - "(runtime_env | default('staging')) == 'staging'"
      notify: reload postgresql
    - name: 'Nomad App | Postgresql | ensure all nomad clients are in pg_hba'
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        line: "host  all  all  {{ item }} md5"
      delegate_to: "{{ db_host }}"
      run_once: true
      loop: "{{ groups['nomad_clients_production'] }}"
      when:
        - "(runtime_env | default('staging')) == 'production'"
      notify: reload postgresql
- name: 'Nomad App | set nomad variables'
  when:
    - nomad_job is defined
    - nomad_vars is defined
    - running_on_server
  ansible.builtin.shell:
    cmd: >
      /usr/local/bin/nomad var put -force 
      nomad/jobs/{{ nomad_job }}
      {{ nomad_vars.keys() | zip(nomad_vars.values()) | map("join", "=") | join(" ") }}
  environment:
    NOMAD_TOKEN: '{{ pul_nomad_management_token }}'
    run_once: true
