- name: Configure Rocky system-auth for Himmelblau MFA
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: '^auth\s+sufficient\s+pam_himmelblau\.so.*'
    line: 'auth     sufficient      pam_himmelblau.so ignore_unknown_user mfa_poll_prompt no_hello_pin'
    backup: true
  when: ansible_os_family == "RedHat"
  notify:
    - restart himmelblaud

- name: Configure Rocky password-auth for Himmelblau MFA
  ansible.builtin.lineinfile:
    path: /etc/pam.d/password-auth
    regexp: '^auth\s+sufficient\s+pam_himmelblau\.so.*'
    line: 'auth     sufficient      pam_himmelblau.so ignore_unknown_user mfa_poll_prompt no_hello_pin'
    backup: true
  when: ansible_os_family == "RedHat"
  notify:
    - restart himmelblaud

- name: Configure Rocky system-auth account handling for Himmelblau
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: '^account\s+.*pam_himmelblau\.so.*'
    line: 'account  [success=done default=ignore] pam_himmelblau.so ignore_unknown_user'
    backup: true
  when: ansible_os_family == "RedHat"
  notify:
    - restart himmelblaud

- name: Configure Rocky password-auth account handling for Himmelblau
  ansible.builtin.lineinfile:
    path: /etc/pam.d/password-auth
    regexp: '^account\s+.*pam_himmelblau\.so.*'
    line: 'account  [success=done default=ignore] pam_himmelblau.so ignore_unknown_user'
    backup: true
  when: ansible_os_family == "RedHat"
  notify:
    - restart himmelblaud

- name: Configure Rocky sshd account stack for Himmelblau
  ansible.builtin.blockinfile:
    path: /etc/pam.d/sshd
    marker: "# {mark} ANSIBLE MANAGED BLOCK entraid_join account"
    insertafter: '^account\s+required\s+pam_nologin\.so'
    block: |
      account    sufficient   pam_himmelblau.so ignore_unknown_user
      account    sufficient   pam_permit.so
    backup: true
  when: ansible_os_family == "RedHat"

- name: Disable Rocky sshd account include password-auth
  ansible.builtin.replace:
    path: /etc/pam.d/sshd
    regexp: '^account\s+include\s+password-auth$'
    replace: '# account    include      password-auth'
    backup: true
  when: ansible_os_family == "RedHat"
