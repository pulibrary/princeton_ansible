---
# Variable setup.
- name: Phusion | Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_distribution_release }}.yml"

- name: Phusion | Define nginx_user
  ansible.builtin.set_fact:
    nginx_user: "{{ __nginx_user }}"
  when: nginx_user is not defined
  tags:
    - passenger_config

# Phusion repository signing keys.
- name: Phusion | Ensure keyring directory exists
  become: true
  ansible.builtin.file:
    path: /usr/local/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

# Legacy auto-software-signing key, still used to sign the Jammy repository.
# https://oss-binaries.phusionpassenger.com/auto-software-signing-gpg-key.txt
- name: Phusion | Download legacy auto signing key
  become: true
  ansible.builtin.get_url:
    url: https://oss-binaries.phusionpassenger.com/auto-software-signing-gpg-key.txt
    dest: /usr/local/share/keyrings/phusion_passenger_legacy.asc
    owner: root
    group: root
    mode: "0644"
  register: phusion_passenger_legacy_key

- name: Phusion | Convert legacy key to GPG keyring
  become: true
  ansible.builtin.command:
    argv:
      - gpg
      - --batch
      - --yes
      - --dearmor
      - --output
      - /usr/local/share/keyrings/phusion_passenger_legacy.gpg
      - /usr/local/share/keyrings/phusion_passenger_legacy.asc
  when: phusion_passenger_legacy_key.changed

- name: Phusion | Install legacy key into apt trusted.gpg.d
  become: true
  ansible.builtin.copy:
    src: /usr/local/share/keyrings/phusion_passenger_legacy.gpg
    dest: /etc/apt/trusted.gpg.d/phusion.gpg
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  when: phusion_passenger_legacy_key.changed

# Phusion SHA-256 signing key.
# https://blog.phusion.nl/important-new-signing-key-for-passenger/
# https://oss-binaries.phusionpassenger.com/auto-software-signing-gpg-key-2025.txt
- name: Phusion | Download SHA-256 apt signing key
  become: true
  ansible.builtin.get_url:
    url: https://oss-binaries.phusionpassenger.com/auto-software-signing-gpg-key-2025.txt
    dest: /usr/local/share/keyrings/phusion_passenger_2025.asc
    owner: root
    group: root
    mode: "0644"
  register: phusion_passenger_key

- name: Phusion | Convert SHA-256 key to GPG keyring
  become: true
  ansible.builtin.command:
    argv:
      - gpg
      - --batch
      - --yes
      - --dearmor
      - --output
      - /usr/local/share/keyrings/phusion_passenger_2025.gpg
      - /usr/local/share/keyrings/phusion_passenger_2025.asc
  when: phusion_passenger_key.changed

- name: Phusion | Install SHA-256 key into apt trusted.gpg.d
  become: true
  ansible.builtin.copy:
    src: /usr/local/share/keyrings/phusion_passenger_2025.gpg
    dest: /etc/apt/trusted.gpg.d/phusion_new.gpg
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  when: phusion_passenger_key.changed

# Phusion repository.
- name: Phusion | Add Phusion apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: >-
      deb https://oss-binaries.phusionpassenger.com/apt/passenger
      {{ ansible_distribution_release }} main
    state: present
    filename: passenger
    update_cache: true

- name: Phusion | Prefer Phusion Passenger packages
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/phusion-passenger
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: passenger libnginx-mod-http-passenger
      Pin: origin oss-binaries.phusionpassenger.com
      Pin-Priority: 999

# NGINX and Passenger package management.
- name: Phusion | Populate package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Phusion | Build complete Nginx and Passenger package transaction
  ansible.builtin.set_fact:
    nginx_passenger_transaction_packages: >-
      {{
        (
          nginx_passenger_packages
          + passenger_additional_nginx_packages
        )
        | unique
        | list
      }}

- name: Phusion | Initialize package installation requirement
  ansible.builtin.set_fact:
    nginx_passenger_install_required: false

- name: Phusion | Determine whether package changes are required
  ansible.builtin.set_fact:
    nginx_passenger_install_required: true
  vars:
    package_name: "{{ item.split('=', 1)[0] }}"
    package_version: "{{ item.split('=', 1)[1] }}"
    installed_versions: >-
      {{
        ansible_facts.packages.get(package_name, [])
        | map(attribute='version')
        | list
      }}
  when:
    - >-
      package_name not in ansible_facts.packages
      or package_version not in installed_versions
  loop: "{{ nginx_passenger_transaction_packages }}"
  loop_control:
    label: "{{ item }}"

- name: Phusion | Display installed and required package versions
  ansible.builtin.debug:
    msg: >-
      {{ package_name }}:
      installed={{
        (
          ansible_facts.packages.get(package_name, [])
          | map(attribute='version')
          | list
          | join(', ')
        )
        | default('not installed', true)
      }},
      required={{ package_version }}
  vars:
    package_name: "{{ item.split('=', 1)[0] }}"
    package_version: "{{ item.split('=', 1)[1] }}"
  loop: "{{ nginx_passenger_transaction_packages }}"
  loop_control:
    label: "{{ package_name }}"

- name: Phusion | Display package transaction
  ansible.builtin.debug:
    var: nginx_passenger_transaction_packages
  when: nginx_passenger_install_required

- name: Phusion | Update apt cache before package installation
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: nginx_passenger_install_required

- name: Phusion | Install pinned Nginx and Passenger packages
  become: true
  ansible.builtin.command:
    argv: >-
      {{
        [
          '/usr/bin/apt-get',
          '--yes',
          '--allow-downgrades',
          '--allow-change-held-packages',
          'install'
        ]
        + nginx_passenger_transaction_packages
      }}
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: nginx_passenger_install_required
  changed_when: true
  notify:
    - restart nginx

- name: Phusion | Refresh package facts after installation
  ansible.builtin.package_facts:
    manager: auto

- name: Phusion | Verify installed Nginx and Passenger versions
  ansible.builtin.assert:
    that:
      - package_name in ansible_facts.packages
      - package_version in installed_versions
    fail_msg: >-
      {{ package_name }} is not at the required version.
      Installed={{
        installed_versions | join(', ')
        if installed_versions | length > 0
        else 'not installed'
      }}.
      Required={{ package_version }}.
    success_msg: >-
      {{ package_name }} is installed at {{ package_version }}.
  vars:
    package_name: "{{ item.split('=', 1)[0] }}"
    package_version: "{{ item.split('=', 1)[1] }}"
    installed_versions: >-
      {{
        ansible_facts.packages.get(package_name, [])
        | map(attribute='version')
        | list
      }}
  loop: "{{ nginx_passenger_transaction_packages }}"
  loop_control:
    label: "{{ package_name }}"

# NGINX and Passenger configuration.
- name: Phusion | Copy Nginx configuration into place
  become: true
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - passenger_config
  notify:
    - "passenger : restart nginx"

- name: Phusion | Configure Passenger virtual host
  become: true
  ansible.builtin.template:
    src: passenger.j2
    dest: /etc/nginx/sites-available/passenger
    owner: root
    group: root
    mode: "0644"
  tags:
    - passenger_config
  notify:
    - restart nginx

- name: Phusion | Ensure Passenger virtual host is enabled
  become: true
  ansible.builtin.file:
    src: /etc/nginx/sites-available/passenger
    dest: /etc/nginx/sites-enabled/passenger
    state: link

- name: Phusion | Ensure default virtual host is removed
  become: true
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: nginx_remove_default_vhost
  notify:
    - restart nginx

# NGINX systemd configuration.
- name: Phusion | Create Nginx override directory
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/nginx.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - notest
    - nginx

- name: Phusion | Restart Nginx on crash
  become: true
  ansible.builtin.copy:
    src: systemd_override.conf
    dest: /etc/systemd/system/nginx.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - notest
    - nginx
  notify:
    - reload systemd

# Checkmk monitoring.
- name: Phusion | Add Checkmk local check
  become: true
  ansible.builtin.copy:
    src: passenger_health_check.sh
    dest: /usr/lib/check_mk_agent/local/passenger_health_check.sh
    owner: root
    group: root
    mode: "0755"
  when: running_on_server
  tags:
    - update_checkmk
