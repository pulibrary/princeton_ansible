---
__nginx_user: "www-data"

nginx_versions:
  jammy: "1.18.0-6ubuntu14.18"
  noble: "1.24.0-2ubuntu7.15"

passenger_versions:
  jammy: "1:6.1.6-1~jammy1"
  noble: "1:6.1.6-1~noble1"

nginx_passenger_packages:
  - "nginx={{ nginx_versions[ansible_distribution_release] }}"
  - "nginx-core={{ nginx_versions[ansible_distribution_release] }}"
  - "nginx-common={{ nginx_versions[ansible_distribution_release] }}"
  - "passenger={{ passenger_versions[ansible_distribution_release] }}"
  - "libnginx-mod-http-passenger={{ passenger_versions[ansible_distribution_release] }}"

# nginx_passenger_packages:
#   - nginx-core
#   - libnginx-mod-http-passenger
#   - passenger
# logrotate rules
logrotate_rules:
  - name: "nginx"
    paths:
      - "/var/log/nginx/*.log"
    options:
      rotate: "{{ logrotate_global_defaults.rotate }}"
      maxsize: "{{ logrotate_global_defaults.maxsize }}"
      create_mode: "{{ logrotate_global_defaults.create_mode }}"
      create_owner: "{{ logrotate_global_defaults.create_owner }}"
      create_group: "{{ logrotate_global_defaults.create_group }}"
      su_user: "{{ logrotate_global_defaults.su_user }}"
      su_group: "{{ logrotate_global_defaults.su_group }}"
      # add passenger-config reopen nginx rotate line
      postrotate: |
        passenger-config reopen-logs >/dev/null 2>&1 || true
