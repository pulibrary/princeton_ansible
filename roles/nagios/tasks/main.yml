---
# add branching logic
# this role can build either the nagios server
# or the NRPE client (nagios agent)

  - name: install or upgrade the nagios server
    include_tasks: build-nagios-server.yml
    when: nagios_task=="build_server"

  - name: install or upgrade the nrpe client
    include_tasks: add-nagios-client.yml
    when: nagios_task=="install_client"

