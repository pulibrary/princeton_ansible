---
# Install a nagios core server on Ubuntu 22.04 LTS Xenial Xerus
#
# might need to sudo apt-get -y install python-simplejson

    - name: update apt cache
      become: yes
      package: update_cache=yes

    - name: install aptitude
      become: yes
      package: name=aptitude state=installed

    - name: upgrade apt packages
      become: yes
      package: upgrade=full

    - name: install packages for nagios
      become: yes
      package: name={{ item }} state=installed
      with_items:
        - apache2
        - build-essential
        - curl
        - libapache2-mod-php
        - libc6-dev
        - libssl-dev
        - openssl
        - python-passlib
        - unzip

    - name: install nrpe and nagios plugins
      include: new-nagios-nrpe.yml

    - name: create nagcmd group
      become: yes
      group: name=nagcmd state=present

    - name: add nagios and apache users to nagcmd group
      become: yes
      user: name={{ item }} groups=nagcmd state=present
      with_items:
        - nagios
        - www-data

    - name: download nagios source
      get_url: url=http://downloads.sourceforge.net/project/nagios/nagios-4.x/nagios-{{ nagios_core_version }}/nagios-{{ nagios_core_version }}.tar.gz dest={{ install_path }}/nagios-{{ nagios_core_version }}.tar.gz

    - name: unzip nagios core source
      unarchive: src={{ install_path }}/nagios-{{ nagios_core_version }}.tar.gz dest={{ install_path }}/ creates={{ install_path }}/nagios-{{ nagios_core_version }}/compile.c copy=no

    - name: configure nagios core
      shell: cd {{ install_path }}/nagios-{{ nagios_core_version }} && ./configure --disable-shared creates={{ install_path }}/nagios-{{ nagios_core_version }}/Makefile

    - name: make and install nagios core
    # this is NOT idempotent
      become: yes
      shell: cd {{ install_path }}/nagios-{{ nagios_core_version }} && make {{ item }}
      with_items:
        - all
        - install
        - install-init
        - install-config
        - install-commandmode
        - install-webconf

    - name: install python-passlib
      become: yes
      package: name=python-passlib state=installed

    - name: set admin password
      become: yes
      htpasswd:
        path: /usr/local/nagios/etc/htpasswd.users
        name: nagiosadmin
        password: "{{ nagios_admin_password }}"
        crypt_scheme: des_crypt
        state: present

    - name: disable mpm_event module
      become: yes
      apache2_module:
        state: absent
        name: mpm_event
        # ignore_configcheck: True

    - name: enable correct apache modules
      become: yes
      apache2_module:
        state: present
        name: "{{ item }}"
      with_items:
        - mpm_prefork
        - php7.0
        - cgi

    - name: install nagios service definition
      become: yes
      copy: src=new-nagios-service dest=/etc/systemd/system/nagios.service

    - name: enable nagios service
      become: yes
      service: name=nagios enabled=yes

    - name: restart apache and nagios
      become: yes
      service: name="{{ item }}" state=restarted
      with_items:
          - nagios
          - apache2
