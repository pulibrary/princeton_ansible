---
- name: Check whether ufw binary exists
  ansible.builtin.stat:
    path: /usr/sbin/ufw
  register: microk8s_ufw_binary

- name: Check UFW status
  ansible.builtin.command: ufw status
  register: microk8s_ufw_status
  changed_when: false
  failed_when: false
  when: microk8s_ufw_binary.stat.exists

- name: Allow MicroK8s cluster traffic from staging subnet
  community.general.ufw:
    rule: allow
    from_ip: "{{ microk8s_cluster_allowed_cidr }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ microk8s_ufw_rules }}"
  when:
    - microk8s_manage_ufw | bool
    - microk8s_ufw_binary.stat.exists
    - "'Status: active' in microk8s_ufw_status.stdout"

- name: Reload UFW
  community.general.ufw:
    state: reloaded
  when:
    - microk8s_manage_ufw | bool
    - microk8s_ufw_binary.stat.exists
    - "'Status: active' in microk8s_ufw_status.stdout"
