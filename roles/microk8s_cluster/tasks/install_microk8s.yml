---
- name: Install snapd and NFS client packages
  ansible.builtin.apt:
    name:
      - snapd
      - nfs-common
    state: present
    update_cache: true

- name: Check whether MicroK8s snap is installed
  ansible.builtin.command: snap list microk8s
  register: microk8s_snap_installed
  changed_when: false
  failed_when: false

- name: Install MicroK8s from default snap channel
  ansible.builtin.command: snap install microk8s --classic
  register: microk8s_snap_install_default
  changed_when: "'installed' in microk8s_snap_install_default.stdout"
  when:
    - microk8s_snap_installed.rc != 0
    - microk8s_snap_channel | default('') | length == 0

- name: Install MicroK8s from configured snap channel
  ansible.builtin.command: "snap install microk8s --classic --channel={{ microk8s_snap_channel }}"
  register: microk8s_snap_install_channel
  changed_when: "'installed' in microk8s_snap_install_channel.stdout"
  when:
    - microk8s_snap_installed.rc != 0
    - microk8s_snap_channel | default('') | length > 0

- name: Install kubectl snap
  community.general.snap:
    name: kubectl
    classic: true
    state: present
  when: microk8s_install_kubectl_snap | bool

- name: Add admin user to microk8s group
  ansible.builtin.user:
    name: "{{ microk8s_admin_user }}"
    groups: microk8s
    append: true

- name: Ensure admin home ownership matches runbook
  ansible.builtin.file:
    path: "{{ microk8s_admin_home }}"
    owner: "{{ microk8s_admin_user }}"
    group: "{{ microk8s_admin_user }}"
    recurse: true
  when: microk8s_manage_admin_home_owner | bool

- name: Wait for MicroK8s to become ready
  ansible.builtin.command: microk8s status --wait-ready
  changed_when: false
