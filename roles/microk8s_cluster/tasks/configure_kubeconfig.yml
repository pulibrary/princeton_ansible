---
- name: Create kube directory for admin user
  ansible.builtin.file:
    path: "{{ microk8s_admin_home }}/.kube"
    state: directory
    owner: "{{ microk8s_admin_user }}"
    group: "{{ microk8s_admin_user }}"
    mode: "0700"

- name: Read MicroK8s kubeconfig
  ansible.builtin.command: microk8s config
  register: microk8s_kubeconfig
  changed_when: false

- name: Write kubeconfig for admin user
  ansible.builtin.copy:
    content: "{{ microk8s_kubeconfig.stdout }}\n"
    dest: "{{ microk8s_admin_home }}/.kube/config"
    owner: "{{ microk8s_admin_user }}"
    group: "{{ microk8s_admin_user }}"
    mode: "0600"
