---
- name: Ubuntu | Make sure the CA certificates are available
  ansible.builtin.apt:
    pkg: ca-certificates
    state: present

- name: Ubuntu | Download PostgreSQL GPG key (ASCII)
  ansible.builtin.get_url:
    url: "{{ postgres_apt_key_url }}"
    dest: "/tmp/postgresql.key"
    mode: '0644'

- name: Ubuntu | De-armor PostgreSQL GPG key to binary keyring
  ansible.builtin.shell: "gpg --dearmor < /tmp/postgresql.key > {{ postgres_keyring_path }}"
  args:
    creates: "{{ postgres_keyring_path }}"
  become: true

- name: Ubuntu | Ensure keyring permissions
  ansible.builtin.file:
    path: "{{ postgres_keyring_path }}"
    mode: '0644'
    owner: root
    group: root
    state: file

- name: Ubuntu | Remove legacy/conflicting repository files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/apt_postgresql_org_pub_repos_apt.list
    - /etc/apt/sources.list.d/pul_postgresql.list
  become: true

- name: Ubuntu | Add PostgreSQL APT repository
  ansible.builtin.apt_repository:
    repo: "{{ postgres_apt_repository }}"
    state: present
    filename: postgresql
    update_cache: true

- name: Ubuntu | install postgresql server packages
  ansible.builtin.apt:
    name: '{{ item }}'
    state: present
  loop:
    - "{{ postgres_packages }}"

- name: PostgreSQL | Prefer PGDG PostgreSQL packages
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/postgresql-pgdg
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: postgresql-client-* postgresql-* libpq5 libpq-dev
      Pin: origin apt.postgresql.org
      Pin-Priority: 1001

- name: PostgreSQL | update apt cache after PGDG pinning
  ansible.builtin.apt:
    update_cache: true

- name: Ubuntu | install postgresql client packages
  ansible.builtin.apt:
    name: '{{ item }}'
    state: present
  loop:
    - "{{ postgres_client_packages }}"
  changed_when: false

- name: Ubuntu | add extensions
  ansible.builtin.import_tasks: extensions.yml

- name: Ubuntu | install configuration file
  ansible.builtin.template:
    src: 'postgresql.conf.j2'
    dest: '/etc/postgresql/{{ postgres_version }}/main/postgresql.conf'
    group: postgres
    owner: postgres
    mode: "0644"
  register: configure_postgres
  notify: restart postgresql

- name: Ubuntu | install pg_stats file
  ansible.builtin.template:
    src: 'statistics_conf.j2'
    dest: '/etc/postgresql/{{ postgres_version }}/main/conf.d/statistics.conf'
    group: postgres
    owner: postgres
    mode: "0644"
  register: configure_postgres
  notify: restart postgresql

- name: Ubuntu | configure pg_hba for client connections to postgres server
  ansible.builtin.lineinfile:
    path: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    line: 'host  {{ pg_hba_postgresql_database }}      {{ pg_hba_postgresql_user }} {{ ansible_default_ipv4.address }}/32       {{ pg_hba_method }}'
  delegate_to: "{{ postgres_host | default(inventory_hostname, true) }}"
  register: remote_postgres_configured
  when:
    - running_on_server | bool
    - (postgres_host | default('', true) | length) > 0
  notify: reload remote postgres
