---
- name: PostgreSQL | create postgresql db server users
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    encrypted: true
    state: "present"
    role_attr_flags: "{{ item.role_attr_flags | default(omit) }}"
  when:
    - running_on_server
    - postgresql_users | length > 0
  become: true
  become_user: "{{ postgres_admin_user }}"
  loop: "{{ postgresql_users }}"
  no_log: true
  run_once: true

- name: PostgreSQL | grant privileges to db server users
  community.postgresql.postgresql_privs:
    database: "{{ item.db }}"
    role: "{{ item.name }}"
    objs: "{{ item.objs | default(item.db) }}"
    privs: "{{ item.priv }}"
    type: "{{ item.type | default('database') }}"
    state: "present"
  when:
    - running_on_server
    - postgresql_users | length > 0
    - item.priv is defined
  become: true
  become_user: "{{ postgres_admin_user }}"
  loop: "{{ postgresql_users }}"
  delegate_to: "{{ postgres_leader }}"
