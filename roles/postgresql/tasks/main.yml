---
- name: Load OS-specific postgresql vars
  ansible.builtin.include_vars:
    file: "{{ ansible_os_family | lower }}.yml"

- name: PostgreSQL | Include OS-specific install tasks
  ansible.builtin.include_tasks: install_{{ ansible_os_family | lower }}.yml

- name: Ensure PostgreSQL is enabled and started
  ansible.builtin.service:
   name: "{{ postgres_service_name }}"
   state: started
   enabled: true
  # when:
  #  - running_on_server

- name: PostgreSQL | add logrotate rules
  ansible.builtin.template:
    src: "../../common/templates/logrotate_rules.j2"
    dest: "/etc/logrotate.d/{{ item.name }}"
    mode: "0644"
    owner: root
    group: root
  loop: "{{ postgresql_logrotate_rules }}"
  when:
    - postgresql_logrotate_rules is defined
    - postgresql_logrotate_rules | length > 0

- name: PostgreSQL | add replication postgresql configuration
  ansible.builtin.template:
    src: replication.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/conf.d/replication.conf"
    mode: "0644"
  when:
    # - running_on_server
    - ansible_os_family == "Debian"
    - postgresql_cluster_member == true
  notify: restart postgresql

# This was for Datadog; it broke and we removed it
# see PR 4642
# - name: PostgreSQL | add pg_stat_statements extension to the default db
#   community.postgresql.postgresql_ext:
#     name: pg_stat_statements
#     db: postgres
#   become: true
#   become_user: postgres
#   when: running_on_server

- name: PostgreSQL | restart leader postgres server
  ansible.builtin.service:
    name: "{{ postgres_service_name }}"
    state: started
  when:
    - postgresql_is_local | bool
    - postgresql_leader == true
    - ansible_os_family == "Debian"
    # - running_on_server

- name: PostgreSQL | ensure pgpass
  ansible.builtin.template:
    src: pg_pass.j2
    dest: "~/.pgpass"
    mode: "0600"
    owner: postgres
  changed_when: false
  when: postgresql_is_local | bool
  become: true

