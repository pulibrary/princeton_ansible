---
- name: PostgreSQL | Install postgresql on RHEL
  ansible.builtin.include_tasks: install_RH.yml
  when:
    - ansible_os_family == "RedHat"
    - running_on_server

- name: PostgreSQL | Make sure the CA certificates are available
  ansible.builtin.apt:
    pkg: ca-certificates
    state: present
  when:
    - ansible_os_family == "Debian"

- name: PostgreSQL | Download PostgreSQL GPG key (ASCII)
  ansible.builtin.get_url:
    url: "{{ postgres_apt_key_url }}"
    dest: "/tmp/postgresql.key"
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: PostgreSQL | De-armor PostgreSQL GPG key to binary keyring
  ansible.builtin.shell: "gpg --dearmor < /tmp/postgresql.key > {{ postgres_keyring_path }}"
  args:
    creates: "{{ postgres_keyring_path }}"
  when: ansible_os_family == "Debian"
  become: true

- name: PostgreSQL | Ensure keyring permissions
  ansible.builtin.file:
    path: "{{ postgres_keyring_path }}"
    mode: '0644'
    owner: root
    group: root
    state: file
  when: ansible_os_family == "Debian"

- name: PostgreSQL | Remove legacy/conflicting repository files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/apt_postgresql_org_pub_repos_apt.list
    - /etc/apt/sources.list.d/pul_postgresql.list
  become: true
  when: ansible_os_family == "Debian"

- name: PostgreSQL | Add PostgreSQL APT repository
  ansible.builtin.apt_repository:
    repo: "{{ postgres_apt_repository }}"
    state: present
    filename: postgresql
    update_cache: true
  when: ansible_os_family == "Debian"

# Tower can now use PSQL 15, 16, or 17
# RHEL 9 supports PSQL 16
- name: Install the postgresql rpm from a remote repo
  ansible.builtin.dnf:
    name: 'https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm'
    state: present

- name: PostgreSQL | install postgresql server packages (Ubuntu)
  ansible.builtin.apt:
    name: '{{ item }}'
    state: present
  loop:
    - "{{ postgres_packages }}"
  when:
    - postgresql_is_local | bool
    - ansible_os_family == "Debian"

- name: PostgreSQL | Ensure PostgreSQL is enabled and started
  ansible.builtin.service:
   name: postgresql-{{ postgres_version }}
   # including the version in the service name is necessary on RHEL
   # what is the service name in Ubuntu?
   # needs testing
   state: started
   enabled: true
  when:
   - running_on_server

- name: PostgreSQL | add a logrotation
  ansible.builtin.template:
    src: "../../common/templates/logrotate_rules.j2"
    dest: "/etc/logrotate.d/{{ item.name }}"
    mode: "0644"
    owner: root
    group: root
  loop: "{{ postgresql_logrotate_rules }}"
  when:
    - postgresql_logrotate_rules is defined
    - postgresql_logrotate_rules | length > 0

- name: PostgreSQL | install postgresql client packages (Ubuntu)
  ansible.builtin.apt:
    name: '{{ item }}'
    state: present
  loop:
    - "{{ postgres_client_packages }}"
  changed_when: false
  when:
    - ansible_os_family == "Debian"

- name: PostgreSQL | add extensions
  ansible.builtin.import_tasks: extensions.yml

- name: PostgreSQL | install configuration file (Ubuntu)
  ansible.builtin.template:
    src: 'postgresql.conf.j2'
    dest: '/etc/postgresql/{{ postgres_version }}/main/postgresql.conf'
    group: postgres
    owner: postgres
    mode: "0644"
  register: configure_postgres
  when:
    - postgresql_is_local | bool
    - ansible_os_family == "Debian"
  notify: restart local postgres

- name: PostgreSQL | install pg_stats file
  ansible.builtin.template:
    src: 'statistics_conf.j2'
    dest: '/etc/postgresql/{{ postgres_version }}/main/conf.d/statistics.conf'
    group: postgres
    owner: postgres
    mode: "0644"
  register: configure_postgres
  when:
    - postgresql_is_local | bool
    - ansible_os_family == "Debian"
  notify: restart local postgres

- name: PostgreSQL | add replication postgresql configuration
  ansible.builtin.template:
    src: replication.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/conf.d/replication.conf"
    mode: "0644"
  when:
    - running_on_server
    - ansible_os_family == "Debian"
    - postgresql_cluster_member == true
  notify: restart postgresql

# we already enabled the service at line 112
# - name: PostgreSQL | ensure postgres starts on boot
#   ansible.builtin.service:
#     name: postgresql-{{ postgres_version }}
#     enabled: true
#   when:
#     - postgresql_is_local | bool

# - name: PostgreSQL | add pg_stat_statements extension to the default db
#   community.postgresql.postgresql_ext:
#     name: pg_stat_statements
#     db: postgres
#   become: true
#   become_user: postgres
#   when: running_on_server

- name: PostgreSQL | restart leader postgres server
  ansible.builtin.service:
    name: postgresql
    state: started
  when:
    - postgresql_is_local | bool
    - postgresql_leader == true
    - ansible_os_family == "Debian"
    - running_on_server

- name: PostgreSQL | ensure pgpass
  ansible.builtin.template:
    src: pg_pass.j2
    dest: "~/.pgpass"
    mode: "0600"
    owner: postgres
  changed_when: false
  when: postgresql_is_local | bool
  become: true

- name: PostgreSQL | ensure access to postgres server (Ubuntu)
  ansible.builtin.blockinfile:
    path: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    insertafter: "# Put your actual configuration here"
    block: |
      # localhost
  when:
    - (postgres_host | default(None)) is not none
    - postgresql_is_local | bool
    - ansible_os_family == "Debian"
    - running_on_server
  become: true
  notify:
    - reload local postgres

- name: PostgreSQL | configure access to postgres server
  ansible.builtin.include_tasks: pg_hba.yml
  when:
    - not postgresql_is_local
    - (postgres_host | default('') | length) > 0

- name: PostgreSQL | configure warm standy
  ansible.builtin.include_tasks: warm_standby_leader.yml
  when:
    - postgresql_cluster != false
    - inventory_hostname == postgresql_cluster.leader

- name: PostgreSQL | configure warm standy follower
  ansible.builtin.include_tasks: warm_standby_follower.yml
  when:
    - postgresql_cluster != false
    - inventory_hostname in postgresql_cluster.followers

- name: PostgreSQL | configure logical replication
  ansible.builtin.include_tasks: logical_replication.yml
  when:
    - postgresql_cluster != false
    - inventory_hostname == postgresql_cluster.leader
    - postgresql_logical_replication != false

- name: PostgreSQL | create database
  ansible.builtin.include_tasks: create_db.yml

- name: PostgreSQL | create users
  ansible.builtin.include_tasks: create_users.yml

- name: PostgreSQL | create read-only user
  ansible.builtin.include_tasks: create_read_only_user.yml
  when: application_dbuser_ro_name is defined
  tags: grant_ro_privs
