---
# defaults file for roles/lego
lego_package: lego
lego_data_dir: /var/db/lego
lego_cert_dir: "{{ lego_data_dir }}/certificates"
lego_webroot: /usr/local/www/acme

# Account
lego_email: ""
lego_key_type: ec384
lego_acme_server: ""

# Renewal
lego_renew_days: 30
lego_renew_hook: "service nginx reload"
lego_renew_log: /var/log/lego-renew.log
lego_renew_cron:
  minute: "17"
  hour: "3"

# List of certs to manage
# Each: { primary: foo.example.com, domains: [foo.example.com, alt.example.com] }
lego_certificates: []

# Bootstrap: write self-signed placeholders so openresty can start
# before lego has issued real certs. The renewal script replaces them.
lego_bootstrap_self_signed: true
lego_bootstrap_days: 7
