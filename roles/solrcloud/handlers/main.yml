---
- name: restart SolrCloud
  ansible.builtin.service:
    name: solr
    state: restarted
  when: solr_service_state != 'stopped'

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart solr-gcs-backup
  ansible.builtin.systemd:
    name: solr-gcs-backup
    state: restarted
    daemon_reload: true
