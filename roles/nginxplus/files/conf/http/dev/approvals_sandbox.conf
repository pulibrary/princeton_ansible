# Ansible managed
proxy_cache_path /var/cache/nginx/approvals-sandbox/ keys_zone=approvals-sandboxcache:10m;

map $limit $external_traffic {
    0 "";
    1 $binary_remote_addr;
}

# zone: 10mb can hold 160K IP addresses in memory
limit_req_zone $external_traffic zone=approvals-sandbox-ratelimit:10m rate=10r/s;

upstream approvals-sandbox {
    zone approvals-sandbox 64k;
    server approvals-px-sandbox1.princeton.edu resolve;
    sticky learn
          create=$upstream_cookie_approvalssandboxcookie
          lookup=$cookie_approvalssandboxcookie
          zone=approvalssandboxclient_sessions:1m;
}

server {
    listen 80;
    server_name approvals-px-sandbox.princeton.edu;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name approvals-px-sandbox.princeton.edu;

    ssl_certificate            /etc/letsencrypt/live/approvals-px-sandbox/fullchain.pem;
    ssl_certificate_key        /etc/letsencrypt/live/approvals-px-sandbox/privkey.pem;
    ssl_session_cache          shared:SSL:1m;
    ssl_prefer_server_ciphers  on;

    location / {
        proxy_pass http://approvals-sandbox;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache approvals-sandboxcache;
        limit_req zone=approvals-sandbox-ratelimit burst=20 nodelay;
        # handle errors using errors.conf
        proxy_intercept_errors on;
        health_check uri=/health.json interval=10 fails=3 passes=2;
        # allow princeton network
        include /etc/nginx/conf.d/templates/restrict.conf;
        # block all
        deny all;
    }

    include /etc/nginx/conf.d/templates/errors-without-404.conf;

}
