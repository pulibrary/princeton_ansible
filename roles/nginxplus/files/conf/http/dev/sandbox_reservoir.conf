upstream reservoir-sandbox {
    ip_hash;
    zone reservoir-sandbox 64k;
    server service.consul service=reservoir-sandbox resolve;

    resolver nomad-host-sandbox1.lib.princeton.edu:8600
             nomad-host-sandbox2.lib.princeton.edu:8600
             nomad-host-sandbox3.lib.princeton.edu:8600
             valid=5s;
    resolver_timeout 2s;

}

# WebSocket helper
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name reservoir-sandbox.lib.princeton.edu;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name reservoir-sandbox.lib.princeton.edu;

    ssl_certificate     /etc/letsencrypt/live/reservoir-sandbox.lib/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reservoir-sandbox.lib/privkey.pem;

    # Main proxy to Reservoir UI
    location / {
        # preserve host/proto for OIDC + absolute URLs
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        # websockets/streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
