server {
    listen 80;
    server_name reservoir-sandbox.lib.princeton.edu;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name reservoir-sandbox.lib.princeton.edu;

    ssl_certificate     /etc/letsencrypt/live/reservoir-sandbox.lib/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reservoir-sandbox.lib/privkey.pem;

    # Main proxy to Reservoir UI
    location / {
        # preserve host/proto for OIDC + absolute URLs
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        # websockets/streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
