upstream lib-px-staging {
    least_time header inflight;
    zone lib-px-staging 64k;

    server lib-pxserv01a.princeton.edu:8006 resolve;
    server lib-pxserv02a.princeton.edu:8006 resolve;
    server lib-pxserv03a.princeton.edu:8006 resolve;

    sticky cookie lib_px_staging_node
        expires=1h
        path=/ 
        httponly
        secure
        samesite=lax;
}

server {
    listen 8006 ssl;
    server_name lib-px-staging.lib.princeton.edu;

    client_max_body_size 0;

    access_log /var/log/nginx/lib-px-staging_access.log;
    error_log  /var/log/nginx/lib-px-staging_error.log;

    ssl_certificate     /etc/letsencrypt/live/lib-px-staging.lib/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lib-px-staging.lib/privkey.pem;

    ssl_session_cache shared:lib_px_staging_SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass https://lib-px-staging;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_ssl_verify off;

        proxy_connect_timeout 450s;
        proxy_send_timeout 450s;
        proxy_read_timeout 450s;

        health_check uri=/api2/json/version
                     interval=10s
                     fails=3
                     passes=2
                     match=lib_px_staging_health;

        # allow princeton network
        include /etc/nginx/conf.d/templates/restrict.conf;
        # block all IPs outside the princeton network
        deny all;
    }
}

match lib_px_staging_health {
    status 401;
}
