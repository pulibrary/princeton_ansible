upstream openpencil_sandbox_upstream {
    zone openpencil_sandbox_upstream 64k;
    server sandbox-openpencil1.lib.princeton.edu:443;
}

server {
    listen 443 ssl http2;
    server_name openpencil-sandbox.lib.princeton.edu;

    ssl_certificate     /path/to/openpencil-sandbox.lib.princeton.edu.pem;
    ssl_certificate_key /path/to/openpencil-sandbox.lib.princeton.edu-key.pem;

    location / {
        proxy_pass https://openpencil_sandbox_upstream;

        proxy_ssl_server_name on;
        proxy_ssl_name sandbox-openpencil1.lib.princeton.edu;

        proxy_set_header Host openpencil-sandbox.lib.princeton.edu;
        proxy_set_header X-Forwarded-Host openpencil-sandbox.lib.princeton.edu;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
