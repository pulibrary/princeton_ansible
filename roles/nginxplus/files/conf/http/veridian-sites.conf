# {{ ansible_managed | comment }}
proxy_cache_path /var/cache/nginx/veridian/ keys_zone=veridiancache:10m;

upstream veridian {
    zone veridian 64k;
    server libserv144.princeton.edu resolve;
    sticky learn
          create=$upstream_cookie_veridiancookie
          lookup=$cookie_veridiancookie
          zone=veridianclient_sessions:1m;
}

upstream veridian14 {
    zone veridian 64k;
    server libserv14.princeton.edu resolve;
}

server {
    listen 80;
    server_name historicperiodicals.princeton.edu;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 80;
    server_name theprince.princeton.edu;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name historicperiodicals.princeton.edu;

    ssl_certificate            /etc/letsencrypt/live/historicperiodicals/fullchain.pem;
    ssl_certificate_key        /etc/letsencrypt/live/historicperiodicals/privkey.pem;
    ssl_session_cache          shared:SSL:1m;
    ssl_prefer_server_ciphers  on;

    location / {
        rewrite ^/(.*)$ https://bluemountain.veridiansoftware.com/$1 permanent;
    }

    include /etc/nginx/conf.d/templates/errors.conf;

}

server {
    listen 443 ssl;
    server_name theprince.princeton.edu;

    ssl_certificate            /etc/letsencrypt/live/theprince/fullchain.pem;
    ssl_certificate_key        /etc/letsencrypt/live/theprince/privkey.pem;
    ssl_session_cache          shared:SSL:1m;
    ssl_prefer_server_ciphers  on;

    rewrite ^/(.*)$ https://papersofprinceton.princeton.edu/$1 permanent;
}
