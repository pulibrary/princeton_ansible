# Ansible managed
server {
    listen 80;
    server_name lae.princeton.edu;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name lae.princeton.edu;

    ssl_certificate            /etc/letsencrypt/live/lae/fullchain.pem;
    ssl_certificate_key        /etc/letsencrypt/live/lae/privkey.pem;
    ssl_session_cache          shared:SSL:1m;
    ssl_prefer_server_ciphers  on;

    # /catalog/<id> goes to /item/<id>
    location ~ ^/catalog/(.*)$ {
        return 301 https://digital-collections.princeton.edu/item/$1;
    }

    # All other paths go to the LAE site.
    location / {
        return 301 https://digital-collections.princeton.edu/collections/lae;
    }
}
