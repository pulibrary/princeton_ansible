---
signoz_namespace: platform
signoz_release_name: signoz
signoz_chart_repo_name: signoz
signoz_chart_repo_url: https://charts.signoz.io
signoz_chart_ref: signoz/signoz
signoz_chart_version: ""

signoz_ingress_enabled: false
signoz_ingress_name: signoz
signoz_ingress_namespace: "{{ signoz_namespace }}"
signoz_ingress_class_name: public
signoz_ingress_service_name: "{{ signoz_release_name }}"
signoz_ingress_service_port: 8080

signoz_global_storage_class: k8s-fs-nfs
signoz_service_type: NodePort
signoz_http_node_port: 32080

signoz_otel_grpc_node_port: 32317
signoz_otel_http_node_port: 32318

signoz_clickhouse_local_storage_enabled: false
signoz_clickhouse_local_storage_class: clickhouse-local
signoz_clickhouse_local_pv_name: clickhouse-signoz-local-pv
signoz_clickhouse_local_pv_size: 450Gi
signoz_clickhouse_local_mount_path: /var/lib/clickhouse
signoz_clickhouse_local_pv_path: /var/lib/clickhouse/pv-signoz
signoz_clickhouse_local_pv_owner: "101"
signoz_clickhouse_local_pv_group: "101"
signoz_clickhouse_local_pv_mode: "0750"
signoz_clickhouse_local_storage_node: ""
signoz_clickhouse_chi_name: signoz-clickhouse
