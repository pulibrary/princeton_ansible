---
# defaults file for roles/bitcurator
admin_user: bcadmin
admin_home: "/home/{{ admin_user }}"
apps_dir: "{{ admin_home }}/apps"
download_dir: /tmp/bitcurator
scripts_dir: "{{ admin_home }}/Desktop/scripts/code"

bitcurator_version: v3.0.0
bagger_version: 2.8.1
droid_version: 6.8
siegfried_version: "1.11.4"
siegfried_deb_arch: "amd64"
siegfried_deb_url: "https://github.com/richardlehane/siegfried/releases/download/v{{ siegfried_version }}/siegfried_{{ siegfried_version }}-1_{{ siegfried_deb_arch }}.deb"

bitcurator_install_theme: false

bitcurator_dependencies:
  - unzip
  - default-jre
  - python3
  - python3-pip
  - curl

bitcurator_python_packages: []

bitcurator_apt_packages:
  - xmount
  - antiword
  - avfs
  - bchunk
  - bison
  - brasero
  - ccrypt
  - cdrdao
  - cifs-utils
  - clamtk
  - clonezilla
  - cmake
  - cryptsetup
  - dbus-x11
  - dcfldd
  - dconf-cli
  - dialog
  - disktype
  - ewf-tools
  - ffmpeg
  - gawk
  - gddrescue
  - ghex
  - gparted
  - grsync
  - gtkhash
  - guymager
  - hardinfo
  - hashdeep
  - hdparm
  - lvm2
  - mediainfo
  - mplayer
  - openssh-client
  - pst-utils
  - qemu-utils
  - sleuthkit
  - smartmontools
  - squashfs-tools
  - ssdeep
  - sudo
  - testdisk
  - tree
  - udisks2
  - vim
  - vlc
  - xfsprogs
  - xorriso
  - yad
  - zerofree

bitcurator_helper_scripts:
  - acquire-digital-archives.sh
  - acquire-files-from-disk-image.sh
  - add-extensions.sh
  - branch_pd.sh
  - createreports.sh
  - ewf-multifiwalk.sh
  - find-flag-words.sh
  - find_rsync_access_and_metadata.sh
  - find_rsync_intermediate_files.sh
  - img-multifiwalk.sh
  - mount.data.sh
  - mount.rbrr.sh
  - mount.storage.sh
  - populate_did.sh
  - populate_did_filesonly.sh
  - prepare_directories.sh
  - prepare_directories_raid.sh
  - rsync-copy-files.sh
  - run-kryoflux-gui.sh
  - sync.to.storage.sh
  - unmount.rbrr.sh
  - unmount.storage.sh
  - validate-bag.sh
