---

- name: Bitcurator | ensure desktop scripts directory exists
  ansible.builtin.file:
    path: "{{ scripts_dir }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Bitcurator | install desktop helper scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ scripts_dir }}/{{ item }}"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop: "{{ bitcurator_helper_scripts }}"
