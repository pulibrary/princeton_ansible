---
## Create Mounts
- name: bibdata | ensure presence of nfs mount
  ansible.posix.mount:
    src: "{{ nfs_server }}:/var/nfs/bibdata"
    path: "/data/bibdata_files"
    state: mounted
    fstype: nfs
    opts: rw,sync,hard
  become: true
  when: running_on_server

- name: bibdata | Create mount directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: "directory"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0775"
  delegate_to: "{{ nfs_server }}"
  become: true
  with_items:
    - "/var/nfs/bibdata/scsb_update_files"
    - "/var/nfs/bibdata/figgy_ark_cache"
  when: running_on_server

