---
## Create Mounts
- name: bibdata | ensure mount point directory exists
  ansible.builtin.file:
    path: "{{ bibdata_data_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0775"
  become: true

- name: bibdata | ensure presence of nfs mount
  ansible.posix.mount:
    src: "{{ nfs_server }}:/var/nfs/bibdata"
    path: "{{ bibdata_data_dir }}"
    state: mounted
    fstype: nfs
    opts: rw,sync,hard
  become: true
  when: running_on_server

- name: bibdata | Create mount directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: "directory"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0775"
  delegate_to: "{{ nfs_server | default('localhost') }}"
  become: true
  with_items:
    - "/var/nfs/bibdata/scsb_update_files"
    - "/var/nfs/bibdata/figgy_ark_cache"
  when:
    - running_on_server
    - nfs_server is defined
