- name: bibdata | Create mount directory structure
  ansible.builtin.file:
    path: '/{{ item }}'
    state: 'directory'
    owner: '{{ deploy_user }}'
    group: 'www-data'
    mode: 0755
  when: running_on_server
  with_items:
    - '/data/bibdata_files/scsb_update_files'
    - '/data/bibdata_files/figgy_ark_cache'


