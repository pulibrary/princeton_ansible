---
## Create Mounts
- name: bibdata | ensure presence of nfs mount
  ansible.posix.mount:
    src: "{{ nfs_server }}:/var/nfs/bibdata"
    path: "/mnt/nfs/bibdata"
    state: mounted
    fstype: nfs
    opts: rw,sync,hard
  become: true
  when: running_on_server

# New: Create symlink to nfs mount
- name: Create a symbolic link
  ansible.builtin.file:
    src: '/mnt/nfs/bibdata'
    dest: '/data/bibdata_files'
    # owner: '{{ deploy_user }}'
    # group: '{{ deploy_user }}'
    state: link

