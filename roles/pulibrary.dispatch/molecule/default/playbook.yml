---
- name: Converge
  hosts: all
  vars:
    - running_on_server: false
    - postgresql_is_local: false
    - postgres_host: "localhost"
    - postgres_port: "5432"
    - postgres_admin_user: "postgres"
    - postgres_admin_password: "VoightKampff"
  roles:
    - role: pulibrary.psql
      postgresql_databases:
        - name: dispatch_db
      postgresql_users:
        - name: dispatch_db_user
          password: "change_me"
          db: dispatch_db
          priv: "ALL"
          role_attr_flags: "SUPERUSER,INHERIT,NOCREATEDB,NOCREATEROLE,NOREPLICATION"
        - name: postgres
          password: "VoightKampff"
          db: postgres
          priv: "ALL"
          role_attr_flags: "CREATEDB,SUPERUSER"
      postgresql_hba_entries:
        - type: local
          database: all
          user: postgres
          method: ident
        - type: host
          database: all
          user: postgres
          address: 127.0.0.1/32
          method: md5
        - type: host
          database: dispatch_db
          user: dispatch_db_user
          address: 127.0.0.1/32
          method: md5
    - role: pulibrary.dispatch
