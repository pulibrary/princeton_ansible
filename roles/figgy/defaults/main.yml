---
# defaults file for rails_app
rails_app_directory: "figgy"
app_db_name: 'figgy'
app_db_user: 'figgy'
app_db_password: 'figgy'
app_db_host: 'localhost'
app_host_name: 'localhost'
figgy_derivatives_mount: '/mnt/iiif-staging1/data/jp2s/figgy_staging'
figgy_repository_mount: '/mnt/diglibdata/hydra_binaries/figgy_staging'
figgy_stream_derivatives_mount: '/mnt/diglibdata/hydra_binaries/figgy_stream_derivatives'
figgy_github_package_token: 'testtoken'
# postgres test VM settings
postgres_port: 5432
postgres_version: 15
postgres_host: postgres
postgres_admin_user: postgres
vault_postgres_admin_password: postgres
postgres_apt_key_url: "https://www.postgresql.org/media/keys/ACCC4CF8.asc"
postgres_apt_repository: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
