---
# defaults file for roles/gateway_nat
# Interface connected to the client/source subnet.
gateway_nat_internal_interface: ""

# Interface connected to the destination/uplink subnet.
gateway_nat_external_interface: ""

# Source subnet that should be NATed when traversing the external interface.
gateway_nat_internal_cidr: ""

# Optional destination subnet restriction for forward rules.
# Leave empty to allow forwarding to any destination reachable via the external interface.
gateway_nat_external_cidr: ""

# Enable IPv4 forwarding.
gateway_nat_enable_ipv4_forwarding: true

# If true, allow new flows initiated from the external side back to the internal side.
# Default is false; only ESTABLISHED,RELATED traffic is allowed back.
gateway_nat_bidirectional_forward: false

# Install the iptables package.
gateway_nat_install_iptables: true

# Install and manage the systemd unit that reapplies rules on boot.
gateway_nat_manage_service: true

# Name of the managed script and service.
gateway_nat_rules_script_path: /usr/local/sbin/gateway-nat-rules.sh
gateway_nat_service_name: gateway-nat-rules.service

# Optional extra forward rules. Example:
# gateway_nat_extra_forward_rules:
#   - { in_interface: "enp2s0", out_interface: "enp1s0", source: "192.168.48.0/24", destination: "10.10.0.0/16" }
gateway_nat_extra_forward_rules: []
