---
# defaults file for roles/xrdp
xrdp_port: 3389

xrdp_manage_ufw: false
xrdp_ufw_allow_from: "128.112.0.0/16"

xrdp_desktop: xfce

xrdp_packages_common:
  - dbus-x11
  - dbus-user-session
  - libpam-systemd
  - xorgxrdp
  - xrdp
# Xubuntu / XFCE
xrdp_packages_xfce:
  - xfce4
  - xfce4-goodies
  - xfce4-session
  - xfce4-terminal
  - xfconf
