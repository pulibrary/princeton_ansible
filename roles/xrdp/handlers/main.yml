---
# handlers file for roles/xrdb
- name: restart xrdp
  ansible.builtin.service:
    name: xrdp
    state: restarted

- name: restart gdm3
  ansible.builtin.service:
    name: gdm3
    state: restarted
  failed_when: false

- name: restart logind
  ansible.builtin.service:
    name: systemd-logind
    state: restarted
