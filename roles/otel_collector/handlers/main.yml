---
- name: Systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - running_on_server | default(true) | bool

- name: Restart otelcol
  ansible.builtin.systemd:
    name: "{{ otel_service_name }}"
    state: restarted
  when:
    - running_on_server | default(true) | bool

