---
- name: Systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart otelcol
  ansible.builtin.systemd:
    name: "{{ otel_service_name }}"
    state: restarted

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: restart otelcol-contrib
  ansible.builtin.systemd:
    name: otelcol-contrib
    state: restarted
  become: true
