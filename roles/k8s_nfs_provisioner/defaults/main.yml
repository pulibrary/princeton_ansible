---
# defaults file for roles/k8s_nfs
k8s_nfs_namespace: platform

k8s_nfs_chart_repo_name: nfs-subdir-external-provisioner
k8s_nfs_chart_repo_url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
k8s_nfs_chart_ref: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
k8s_nfs_release_name: nfs-subdir-external-provisioner

k8s_nfs_server: k8s-fs-staging.lib.princeton.edu
k8s_nfs_path: /var/nfs/k8s

k8s_nfs_storage_class: k8s-fs-nfs
k8s_nfs_default_class: false
k8s_nfs_archive_on_delete: true
