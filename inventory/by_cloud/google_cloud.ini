# for *BSD, which has 'doas'instead of 'sudo'
# set ansible_become_method - see the 'obsd' group of groups

[bastion_production]
bastion-prod.pulcloud.io

[bastion_staging]
bastion-staging.pulcloud.io

[cdhapps_staging]
gcp-simrisk-staging ansible_host=10.140.0.17

[dspace_production]
gcp-dataspace-prod1 ansible_host=10.244.0.2
gcp-oar-prod1 ansible_host=10.244.0.3

[dspace_staging]
gcp-dataspace-staging1 ansible_host=10.132.0.5
gcp-oar-staging1 ansible_host=10.132.0.4

[gcploadbalancer_dev]
# inventory name is dev.pucloud.io; GCP VM name is dev-adc to be deleted once prod goes in
dev.pulcloud.io ansible_ssh_common_args=''
[gcploadbalancer_staging]
# inventory name is staging.pucloud.io; GCP VM name is staging-adc
staging.pulcloud.io ansible_ssh_common_args=''
[gcploadbalancer_production]
# inventory name is prod.pucloud.io; GCP VM name is gcdc-prod-adc
prod.pulcloud.io ansible_ssh_common_args=''

[gcploadbalancer_staging:vars]
ansible_python_interpreter=/usr/local/bin/python


[pulcheck_gcp]
pulmonitor-gcp.pulcloud.io
# do not add to the gcp_production group
# already included in the main 'production' group
# otherwise we'll have a race condition, monitoring the monitoring 
[pulmirror_staging]
pultestmirror.princeton.edu

[pulmirror_production]
pulmirror.princeton.edu ansible_ssh_common_args=''

[proquestdrop_production]
proquestdrop.pulcloud.io ansible_ssh_common_args=''

[gcp_production:children]
dspace_production
proquestdrop_production

[pulmirror_production:vars]
ansible_python_interpreter=/usr/local/bin/python

[gcp_production:vars]
ansible_ssh_common_args=-o ProxyCommand="ssh '-o ForwardAgent yes' '-o StrictHostKeyChecking=accept-new' -q pulsys@bastion-prod.pulcloud.io -W %h:%p"
checkmk_folder=linux/production

[gcp_staging:children]
cdhapps_staging
dspace_staging
gcploadbalancer_staging

[gcp_staging:vars]
ansible_ssh_common_args=-o ProxyCommand="ssh '-o ForwardAgent yes' '-o StrictHostKeyChecking=accept-new' -q pulsys@bastion-staging.pulcloud.io -W %h:%p"
ansible_python_interpreter=/usr/bin/python3
checkmk_folder=linux/staging

[obsd:children]
bastion_production
bastion_staging
pulmirror_production
proquestdrop_production

[obsd:vars]
ansible_become_method=doas
ansible_python_interpreter=/usr/local/bin/python3

[gcp_operations:children]
bastion_production
bastion_staging
pulmirror_production

[gcp_operations:vars]
checkmk_folder=linux/operations
