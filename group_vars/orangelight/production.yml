---
alma_read_write_key: "{{ vault_alma_read_write_key }}"
install_mailcatcher: false
ol_bibdata_base: 'https://bibdata.princeton.edu'
ol_db_name: '{{ vault_ol_db_name }}'
ol_db_user: '{{ vault_ol_db_user }}'
ol_db_password: '{{ vault_ol_db_password }}'
ol_graph_api_url: "{{ vault_ol_alma_qa_graph_api_url }}"
ol_host_name: "catalog.princeton.edu"
ol_rabbit_host: "figgy-web-prod1.princeton.edu"
ol_rabbit_password: "{{ vault_rabbit_production_password }}"
ol_rabbit_user: "{{ vault_rabbit_production_user }}"
ol_read_only_mode: 'false'
central_redis_host: 'lib-redis-prod1.princeton.edu'
central_redis_db: '7'
ol_secret_key: "{{ vault_ol_secret_key }}"
ol_secret_key_base: "{{ vault_ol_production_secret_key_base }}"
ol_smtp_host: "lib-ponyexpr-prod.princeton.edu"
ol_smtp_port: "25"
passenger_app_env: "production"
passenger_server_name: "catalog-alma.*"
postgres_admin_password: '{{ vault_postgres_admin_password }}'
postgres_admin_user: "postgres"
postgres_host: "lib-postgres-prod1.princeton.edu"
postgres_port: "5432"
rails_app_env: "production"
passenger_max_pool_size: 30
scsb_auth_key: "{{ vault_scsb_auth_key }}"
datadog_api_key: "{{ vault_datadog_key }}"
datadog_config:
  tags: "application:orangelight, environment:production, type:webserver"
  apm_enabled: "true"
  log_enabled: true
  process_config:
    enabled: "true"
  apm_config:
    analyzed_spans:
      orangelight|rack.request: 1
    filter_tags:
      reject: ["http.useragent:nginx/1.23.4 (health check)", "operation:heartbeat", "operation:job_fetch", "operation:scheduled_push", "operation:scheduled_poller_wait"]
datadog_typed_checks:
  - type: process
    configuration:
      init_config:
      instances:
        - name: orangelight
          service: orangelight
          search_string:
            - nginx
  - type: nginx
    configuration:
      init_config:
      instances:
        - nginx_status_url: http://localhost:80/nginx_status/
      logs:
        - type: file
          path: /var/log/nginx/access.log
          source: nginx
          service: orangelight
        - type: file
          path: /var/log/nginx/error.log
          source: nginx
          service: orangelight
        - type: file
          path: /opt/orangelight/current/log/production.log
          source: rails
          service: orangelight
# beyla
beyla_enabled: true
beyla_service_name: orangelight
beyla_environment: production
beyla_otlp_endpoint: "http://127.0.0.1:4318"
beyla_otlp_protocol: "http/protobuf"
beyla_bpf_context_propagation: "all"

beyla_open_ports:
  - 80

# signoz
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: orangelight
  service.version: production
  environment: production

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318
  filelog/nginx-access:
    include: ["/var/log/nginx/access.log*"]
    start_at: end
    operators:
      - type: regex_parser
        regex: '^(?P<remote_addr>[^\s]+) \((?P<remote_user>[^)]*)\) - - \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
        parse_from: body
      - type: time_parser
        parse_from: attributes.time_local
        layout_type: strptime
        layout: '%d/%b/%Y:%H:%M:%S %z'
      - type: add
        field: attributes.log_type
        value: "orangelight_access"
      - type: add
        field: attributes.service_name
        value: orangelight_access

  filelog/nginx-error:
    include: ["/var/log/nginx/error.log*"]
    start_at: end
    operators:
      - type: add
        field: attributes.log_type
        value: "orangelight_error"
      - type: add
        field: attributes.service_name
        value: "orangelight"

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-prod1.lib.princeton.edu:32317
          - k8s-prod2.lib.princeton.edu:32317
          - k8s-prod3.lib.princeton.edu:32317

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/nginx-access
      - filelog/nginx-error
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
