---
db_host: 'lib-postgres-prod1.princeton.edu'
db_user: 'dpulc_production'
db_name: 'dpulc_production'
db_admin_user: 'postgres'
db_password: '{{ vault_dpul_c_production_db_password }}'
figgy_db_host: 'figgy-db-prod1.princeton.edu'
figgy_db_name: 'figgy_production'
figgy_db_password: "{{ vault_dpul_c_production_figgy_db_password }}"
basic_auth_username: "{{ vault_dpul_c_basic_auth_username }}"
basic_auth_password: "{{ vault_dpul_c_basic_auth_password }}"
database_connections:
  - db_host: '{{ db_host }}'
    db_name: '{{ db_name }}'
    db_owner: '{{ db_user }}'
    db_user: '{{ db_user }}'
    db_password: '{{ db_password }}'
    db_admin_user: '{{ db_admin_user }}'
  - db_host: '{{ figgy_db_host }}'
    db_name: '{{ figgy_db_name }}'
    db_user: '{{ db_user }}'
    db_password: '{{ figgy_db_password }}'
    db_admin_user: '{{ db_admin_user }}'
    read_only: true
nomad_vars:
  dpulc-production:
    DB_NAME: '{{ db_name }}'
    DB_USER: '{{ db_user }}'
    DB_PASSWORD: '{{ db_password }}'
    POSTGRES_HOST: '{{ db_host }}'
    SECRET_KEY_BASE: '{{ vault_dpul_c_secret_key_base }}'
    SOLR_BASE_URL: 'http://lib-solr8-prod.princeton.edu:8983'
    SOLR_URL: 'http://lib-solr8-prod.princeton.edu:8983/solr/dpulc-production'
    FIGGY_DATABASE_URL: 'ecto://{{db_user}}:{{ figgy_db_password }}@{{ figgy_db_host }}/{{ figgy_db_name }}'
    BASIC_AUTH_USERNAME: '{{ basic_auth_username }}'
    BASIC_AUTH_PASSWORD: '{{ basic_auth_password }}'
    HONEYBADGER_API_KEY: '{{ vault_dpul_c_honeybadger_key }}'
    GRAFANA_SERVICE_TOKEN: '{{ vault_dpul_c_grafana_nomad_token }}'
    METRICS_AUTH_TOKEN: '{{ vault_metrics_auth_token }}'
    LIBANSWERS_QUEUE_ID: '{{ vault_dpul_c_libanswers_digital_library_queue_id }}'
    LIBANSWERS_CLIENT_ID: '{{ vault_dpul_c_libanswers_client_id }}'
    LIBANSWERS_CLIENT_SECRET: '{{ vault_dpul_c_libanswers_client_secret }}'
