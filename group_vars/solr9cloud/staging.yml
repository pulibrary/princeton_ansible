---
java_version: 17
install_ruby_from_source: true
install_zookeeper_from_source: true
desired_ruby_version: "3.4.1"
ruby_version_override: "ruby-3.4.1"
solr_heap_setting: '20g'
jardirectory: "/opt/solr/lib"
jolokia_agent_version: "2.5.1"
# more granular option would be:
# solr_java_memory: '-Xms16g -Xmx20g'
# solr shards
solr_shard_socket_timeout: 120000
solr_shard_conn_timeout:   60000
solr_update_socket_timeout: 120000
solr_update_conn_timeout:   60000
solr_update_max_connections: 512
solr_update_max_per_host:    64
# solr version
solr_cloud_download_version: 9.9.0
solr_cloud_version: "{{ solr_version }}"
solr_version: "{{ solr_cloud_download_version }}"
solr_log4j_path: '/solr/log4j2.xml'
solr_znode: solr9
solr_nodes:
  - "lib-solr-staging1.princeton.edu"
  - "lib-solr-staging2.princeton.edu"
  - "lib-solr-staging3.princeton.edu"
solr_zookeeper_hosts:
  - "lib-zk-staging4.princeton.edu:2181"
  - "lib-zk-staging5.princeton.edu:2181"
  - "lib-zk-staging6.princeton.edu:2181"
cjkfoldingfilter: https://github.com/pulibrary/pul_solr/raw/master/solr8_jars/CJKFoldingFilter.jar

# gcsfuse logrotate
gcsfuse_directory: "/var/log/gcsfuse"

solr9_gcsfuse_logrotate_rules:
  - name: "gcsfuse"
    paths:
      - "{{ gcsfuse_directory }}/*.log"
    options:
      rotate: "{{ logrotate_global_defaults.rotate }}"
      maxsize: "{{ logrotate_global_defaults.maxsize }}"
      create_mode: "{{ logrotate_global_defaults.create_mode }}"
      create_owner: "deploy"
      create_group: "deploy"
      su_user: "{{ logrotate_global_defaults.su_user }}"
      su_group: "{{ logrotate_global_defaults.su_group }}"
      postrotate: |
        systemctl reload solr-gcsfuse.service 2>/dev/null || true

# signoz / otel collector for Solr
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: solr
  service.version: staging
  environment: staging

otel_receivers:
  filelog/solr-main:
    include:
      - /solr/logs/solr.log
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: recombine
        id: recombine_solr_stacktraces
        combine_field: body
        source_identifier: attributes["log.file.path"]
        is_first_entry: 'body matches "^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d{3} "'
        force_flush_period: 5s

      - type: regex_parser
        id: parse_solr_log
        regex: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<level>[A-Z]+)\s+\((?P<thread>[^)]*)\) \[(?P<collection>[^\]]*)\] (?P<logger>\S+) (?P<message>[\s\S]*)$'
        parse_from: body
        on_error: send

      - type: time_parser
        parse_from: attributes.timestamp
        layout_type: strptime
        layout: '%Y-%m-%d %H:%M:%S.%L'
        on_error: send

      - type: severity_parser
        parse_from: attributes.level
        on_error: send

      - type: add
        field: attributes.log_type
        value: solr_main

      - type: add
        field: attributes.service_name
        value: solr

  filelog/solr-request:
    include:
      - /solr/logs/*.request.log
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: add
        field: attributes.log_type
        value: solr_request

      - type: add
        field: attributes.service_name
        value: solr

  filelog/solr-gc:
    include:
      - /solr/logs/solr_gc.log
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: add
        field: attributes.log_type
        value: solr_gc

      - type: add
        field: attributes.service_name
        value: solr

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-staging1.lib.princeton.edu:30374
          - k8s-staging2.lib.princeton.edu:30374
          - k8s-staging3.lib.princeton.edu:30374

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/solr-main
      - filelog/solr-request
      - filelog/solr-gc
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug
