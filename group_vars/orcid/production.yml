---
postgres_host: 'lib-postgres-prod1.princeton.edu'
postgres_version: 15

passenger_server_name: "orcid-prod1.princeton.edu"
passenger_app_env: "production"
passenger_extra_config: "client_max_body_size 0;"

orcid_db_name: 'orcid_prod'

orcid_db_user: '{{vault_orcid_production_db_user}}'
orcid_db_password: '{{vault_orcid_production_db_password}}'
ruby_app_env: "production"

orcid_host_name: 'orcid-prod.princeton.edu'
orcid_honeybadger_key: '{{vault_orcid_honeybadger_key}}'

orcid_secret_key: '{{vault_orcid_production_secret_key}}'
orcid_rails_main_key: '{{vault_orcid_production_rails_main_key}}'

orcid_client_id: '{{vault_orcid_production_client_id}}'
orcid_client_secret: '{{vault_orcid_production_client_secret}}'
orcid_sandbox: false
orcid_token_secret: '{{ vault_orcid_production_token_secret }}'
app_banner_title: ''
app_banner_body: ''
app_orcid_sandbox: false
app_orcid_url: 'https://api.orcid.org/v3.0'
peoplesoft_output_location: '/mnt/peoplesoft/sr_orcid/prod/ORCID_portal_report.csv'

entra_client_id: "{{ vault_entra_client_id_production }}"
entra_client_secret: "{{ vault_entra_client_secret_production }}"

# beyla
beyla_enabled: true
beyla_service_name: orcid
beyla_environment: production
beyla_otlp_endpoint: "http://127.0.0.1:4318"
beyla_otlp_protocol: "http/protobuf"
beyla_bpf_context_propagation: "all"

beyla_open_ports:
  - 80

# signoz
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: orcid
  service.version: production
  environment: production

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318
  filelog/nginx-access:
    include: ["/var/log/nginx/access.log*"]
    start_at: end
    operators:
      - type: regex_parser
        regex: '^(?P<remote_addr>[^\s]+) \((?P<remote_user>[^)]*)\) - - \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
        parse_from: body
      - type: time_parser
        parse_from: attributes.time_local
        layout_type: strptime
        layout: "%d/%b/%Y:%H:%M:%S %z"
      - type: add
        field: attributes.log_type
        value: "orcid_access"
      - type: add
        field: attributes.service_name
        value: orcid_access

  filelog/nginx-error:
    include: ["/var/log/nginx/error.log*"]
    start_at: end
    operators:
      - type: add
        field: attributes.log_type
        value: "orcid_error"
      - type: add
        field: attributes.service_name
        value: "orcid"

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-prod1.lib.princeton.edu:32317
          - k8s-prod2.lib.princeton.edu:32317
          - k8s-prod3.lib.princeton.edu:32317

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/nginx-access
      - filelog/nginx-error
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
