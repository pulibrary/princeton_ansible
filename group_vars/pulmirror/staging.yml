---
pulmirror_domain: "pultestmirror.pulcloud.io"
pulmirror_domains:
  - "pultestmirror.pulcloud.io"

pulmirror_email: "lsupport@princeton.edu"

pulmirror_dns_provider: "dnsimple"
pulmirror_dnsimple_oauth_token: "{{ vault_dnsimple_oauth_token }}"

pulmirror_path: "/usr/local/etc/lego"
pulmirror_nginx_conf: "/usr/local/etc/nginx/conf.d/pultestmirror.pulcloud.io.conf"

pulmirror_ssl_certificate: "/usr/local/etc/lego/certificates/pultestmirror.pulcloud.io.crt"
pulmirror_ssl_certificate_key: "/usr/local/etc/lego/certificates/pultestmirror.pulcloud.io.key"

pulmirror_use_staging: true
