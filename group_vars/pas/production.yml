---
php_version: "8.3"
php_unwanted_version: "8.1"
pas_db_name: "pas_prod"
pas_db_user: "pas"
pas_password: '{{ vault_pas_db_password }}'
pas_security_key: '{{ vault_pas_security_key }}'
db_host: 'mysql-db-prod1.princeton.edu'
mysql_root_password: "{{ vault_mysql_root_password }}"
pas_default_site_url: 'https://slavery.princeton.edu'
pas_db_driver: 'mysql'
pas_env: 'production'
craft_version: 4

mysql_host: "mysql-db-prod1.princeton.edu"
mysql_databases:
  - name: "{{ pas_db_name }}"
    encoding: utf8mb4
    collation: utf8mb4_general_ci
mysql_users:
  - name: "{{ pas_db_user }}"
    host: "{{ ansible_default_ipv4.address }}"
    password: "{{ pas_password }}"
    priv: "{{ pas_db_name }}.*:ALL"
    update_password: on_create

datadog_api_key: "{{ vault_datadog_key }}"

datadog_config:
  log_enabled: true
  apm_enabled: true
  process_enabled: true
datadog_typed_checks:
  - type: tls
    configuration:
      init_config:
      instances:
        - server: slavery.princeton.edu
          port: 443
  - type: process
    configuration:
      init_config:
      instances:
        - name: pas
          service: pas
          search_string:
            - apache2
  - type: apache
    configuration:
      init_config:
      instances:
        - apache_status_url: http://127.0.0.1/server-status?auto
      logs:
        - type: file
          path: /var/log/apache2/other_vhosts_access.log
          service: pas
          source: apache
          sourcecategory: http_web_access
          tags: "pas, env:prod, role:pas"
        - type: file
          path: /var/log/apache2/error.log
          service: pas
          source: apache
          sourcecategory: http_web_access
          tags: "pas, env:prod, role:pas"
        - type: file
          path: /opt/pas_cap/current/storage/logs/web.log
          service: pas
          source: pas
          sourcecategory: pas
          tags: "pas, env:prod, role:pas"
        - type: file
          path: /opt/pas_cap/current/storage/logs/phperrors.log
          service: pas
          source: pas
          sourcecategory: pas
          tags: "pas, env:prod, role:pas"
        - type: file
          path: /opt/pas_cap/current/storage/logs/web-404s.log
          service: pas
          source: pas
          sourcecategory: pas
          tags: "pas, env:prod, role:pas"
# beyla
beyla_enabled: true
beyla_service_name: pas
beyla_environment: production
beyla_otlp_endpoint: "http://127.0.0.1:4318"
beyla_otlp_protocol: "http/protobuf"
beyla_bpf_context_propagation: "all"

beyla_open_ports:
  - 80

# signoz / otel collector for pas
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: pas
  service.version: production
  environment: production
  deployment.environment: production

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

  filelog/apache2-access:
    include:
      - /var/log/apache2/access.log
      - /var/log/apache2/other_vhosts_access.log
      - /opt/pas_cap/current/storage/logs/web.log
      - /opt/pas_cap/current/storage/logs/phperrors.log
      - /opt/pas_cap/current/storage/logs/web-404s.log
    exclude:
      - /var/log/apache2/*.gz
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: regex_parser
        id: parse_apache_vhost_access
        regex: '^(?P<vhost>[^ ]+) (?P<client_ip>[0-9a-fA-F:.]+) (?P<ident>[^ ]+) (?P<user>[^ ]+) \[(?P<timestamp>[^\]]+)\] "(?P<method>[A-Z]+) (?P<target>[^ ]+) (?P<protocol>HTTP/[0-9.]+)" (?P<status>[0-9]{3}) (?P<bytes_sent>[0-9]+|-) "(?P<referrer>[^"]*)" "(?P<user_agent>[^"]*)"$'
        timestamp:
          parse_from: attributes.timestamp
          layout: '%d/%b/%Y:%H:%M:%S %z'

      - type: move
        from: attributes.client_ip
        to: attributes.http.client_ip

      - type: move
        from: attributes.method
        to: attributes.http.request.method

      - type: move
        from: attributes.target
        to: attributes.url.path

      - type: move
        from: attributes.status
        to: attributes.http.response.status_code

      - type: move
        from: attributes.user_agent
        to: attributes.user_agent.original

      - type: move
        from: attributes.referrer
        to: attributes.http.request.header.referer

  filelog/apache2-error:
    include:
      - /var/log/apache2/error.log
    exclude:
      - /var/log/apache2/*.gz
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: regex_parser
        id: parse_apache_error
        regex: '^\[(?P<timestamp>[^\]]+)\] \[(?P<module>[^:\]]+)(?::(?P<severity>[^\]]+))?\] \[pid (?P<pid>[0-9]+)(?::tid (?P<tid>[0-9]+))?\](?: \[client (?P<client_ip>[^\]]+)\])? (?P<message>.*)$'
        timestamp:
          parse_from: attributes.timestamp
          layout: '%a %b %d %H:%M:%S.%f %Y'

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-prod1.lib.princeton.edu:32317
          - k8s-prod2.lib.princeton.edu:32317
          - k8s-prod3.lib.princeton.edu:32317

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/apache2-access
      - filelog/apache2-error
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug
