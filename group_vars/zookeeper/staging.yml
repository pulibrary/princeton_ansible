---
# List of ZooKeeper nodes
zk_nodes:
  - host: "lib-zk-staging4.princeton.edu"
    id: 1
  - host: "lib-zk-staging5.princeton.edu"
    id: 2
  - host: "lib-zk-staging6.princeton.edu"
    id: 3

# signoz
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: zookeeper
  service.version: staging
  environment: staging

otel_receivers:
  journald/zookeeper:
    units:
      - zookeeper.service
    priority: info

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-staging1.lib.princeton.edu:30374
          - k8s-staging2.lib.princeton.edu:30374
          - k8s-staging3.lib.princeton.edu:30374

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - journald/zookeeper
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug
