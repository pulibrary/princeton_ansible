---
adc_domain: "adc-dev.lib.princeton.edu"
nginx_http_upload_src: conf/http/dev/*.conf
nginx_template_upload_src: conf/http/dev/templates/*.conf

# modules to install
nginx_modules:
  waf: false
  geoip: true
  njs: true
  perl: true
  image_filter: true
  rtmp: true
  otel: true
  xslt: true

# dos: true
# app_protect logs
app_protect_dir: "/var/log/app_protect/*.log"
sites: []

# signoz / otel collector for nginxplus load balancers
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: nginxplus-lb
  service.version: staging
  environment: staging
  deployment.environment: staging

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

  nginx:
    endpoint: http://127.0.0.1:18080/nginx_status
    collection_interval: 30s

  filelog/nginxplus-access:
    include:
      - /var/log/nginx/access.log
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: json_parser
        id: parse_nginxplus_access_json
        parse_from: body

      - type: time_parser
        parse_from: attributes.timestamp
        layout_type: strptime
        layout: '%Y-%m-%dT%H:%M:%S%z'
        on_error: send

      - type: severity_parser
        parse_from: attributes.status
        mapping:
          info:
            - '^2\d\d$'
            - '^3\d\d$'
          warn:
            - '^4\d\d$'
          error:
            - '^5\d\d$'
        on_error: send

      # If ngx_otel_module populated trace_id/span_id directly,
      # promote them to top-level log fields for trace/log correlation.
      - type: move
        from: attributes.trace_id
        to: trace_id
        if: 'attributes.trace_id != nil and attributes.trace_id != ""'

      - type: move
        from: attributes.span_id
        to: span_id
        if: 'attributes.span_id != nil and attributes.span_id != ""'

      # If trace_id/span_id were not populated directly but traceparent exists,
      # extract the W3C traceparent header into attributes.
      - type: regex_parser
        id: parse_traceparent
        parse_from: attributes.traceparent
        regex: '^(?P<trace_version>[0-9a-f]{2})-(?P<trace_id>[0-9a-f]{32})-(?P<span_id>[0-9a-f]{16})-(?P<trace_flags>[0-9a-f]{2})$'
        if: '(trace_id == nil or trace_id == "") and attributes.traceparent != nil and attributes.traceparent != ""'
        on_error: send

      # Promote traceparent-derived IDs if direct ngx_otel IDs were not present.
      - type: move
        from: attributes.trace_id
        to: trace_id
        if: 'trace_id == nil and attributes.trace_id != nil and attributes.trace_id != ""'

      - type: move
        from: attributes.span_id
        to: span_id
        if: 'span_id == nil and attributes.span_id != nil and attributes.span_id != ""'

      - type: add
        field: attributes.log_type
        value: nginxplus_access

      - type: add
        field: attributes.service_name
        value: nginxplus-lb

  filelog/nginxplus-error:
    include:
      - /var/log/nginx/error.log
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: regex_parser
        id: parse_nginxplus_error
        regex: '^(?P<time_local>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?:\*(?P<connection>\d+) )?(?P<message>[\s\S]*)$'
        parse_from: body
        on_error: send

      - type: time_parser
        parse_from: attributes.time_local
        layout_type: strptime
        layout: '%Y/%m/%d %H:%M:%S'
        on_error: send

      - type: severity_parser
        parse_from: attributes.level
        on_error: send

      - type: add
        field: attributes.log_type
        value: nginxplus_error

      - type: add
        field: attributes.service_name
        value: nginxplus-lb

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-staging1.lib.princeton.edu:30374
          - k8s-staging2.lib.princeton.edu:30374
          - k8s-staging3.lib.princeton.edu:30374

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/nginxplus-access
      - filelog/nginxplus-error
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - nginx
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug
