---
grafana_gh_secret: '{{ vault_grafana_gh_secret }}'
grafana_gh_client_id: '{{ vault_grafana_gh_client_id }}'
grafana_nomad_token: '{{ vault_pul_nomad_management_token }}'
grafana_db_host: 'lib-postgres-staging1.princeton.edu'
grafana_db_name: 'grafana-staging'
grafana_db_user: '{{ vault_grafana_staging_db_user }}'
grafana_db_password: '{{ vault_grafana_staging_db_password }}'
grafana_db_admin_user: "postgres"
grafana_nomad_env_vars:
  GH_SECRET: '{{ grafana_gh_secret }}'
  GH_CLIENT_ID: '{{ grafana_gh_client_id }}'
  NOMAD_TOKEN: '{{ vault_grafana_nomad_token  }}'
  DB_HOST: '{{ grafana_db_host }}'
  DB_NAME: '{{ grafana_db_name }}'
  DB_USER: '{{ vault_grafana_staging_db_user }}'
  DB_PASSWORD: '{{ vault_grafana_staging_db_password }}'
grafana_prometheus_nomad_env_vars:
  CONSUL_ACL_TOKEN: '{{ nomad_task_consul_token }}'
  METRICS_AUTH_TOKEN: '{{ vault_metrics_auth_token }}'
  METRICS_BASIC_PASSWORD: '{{ vault_metrics_basic_password }}'
