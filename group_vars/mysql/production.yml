---
mysql_server: true
mysql_host: "mysql-db-prod1.princeton.edu"
mysql_bind_address: "0.0.0.0"
mysql_root_password: "{{ vault_mysql_root_password }}"

datadog_api_key: "{{ vault_datadog_key }}"
datadog_service_name:
datadog_environment: prod

datadog_enabled: true
datadog_config:
  log_enabled: true
  apm_enabled: true
  process_enabled: true
datadog_typed_checks:

  - type: mysql
    configuration:
      init_config:
      instances:
      logs:
        - type: file
          path: /var/log/mysql/mysql_error.log
          service: mysql-database-service
          source: mysql

        # removing these logs from datadog to reduce our bill
        # leaving comments in case we need to reinstate them for debugging
        #
        # - type: file
        #   path: /var/log/mysql/mysql_slow.log
        #   service: mysql-database-service
        #   source: mysql
        #   log_processing_rules:
        #     - type: multi_line
        #       name: new_slow_query_log_entry
        #       pattern: "# Time:"
        #       # If mysqld was started with `--log-short-format`, use:
        #       # pattern: "# Query_time:"
        # 
        # - type: file
        #   path: /var/log/mysql/mysql.log
        #   service: mysql-database-service
        #   source: mysql
# Beyla
beyla_enabled: true
beyla_service_name: mysql
beyla_environment: production
beyla_otlp_endpoint: "http://127.0.0.1:4318"
beyla_otlp_protocol: "http/protobuf"
beyla_bpf_context_propagation: "all"

beyla_open_ports:
  - 3306
# SigNoz / OpenTelemetry Collector
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: mysql
  service.version: production
  environment: production
  deployment.environment: production

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-prod1.lib.princeton.edu:32317
          - k8s-prod2.lib.princeton.edu:32317
          - k8s-prod3.lib.princeton.edu:32317

  debug:
    verbosity: basic

otel_service_pipelines:
  metrics:
    receivers:
      - otlp
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug
