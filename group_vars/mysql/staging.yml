---
mysql_server: true
mysql_host: "mysql-db-dev1.princeton.edu"
mysql_bind_address: "0.0.0.0"
mysql_root_password: "{{ vault_mysql_root_password }}"

otel_mysql_enabled: true
otel_mysql_endpoint: "127.0.0.1:3306"
otel_mysql_username: "otel"
otel_mysql_password: "${env:OTEL_MYSQL_PASSWORD}"
otel_mysql_collection_interval: "10s"
otel_mysql_initial_delay: "1s"
otel_mysql_statement_events_enabled: true
otel_mysql_statement_digest_text_limit: 120
otel_mysql_statement_time_limit: "24h"
otel_mysql_statement_limit: 250
# signoz / otel collector for mysql
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: mysql
  service.version: staging
  environment: staging
  deployment.environment: staging

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-staging1.lib.princeton.edu:30374
          - k8s-staging2.lib.princeton.edu:30374
          - k8s-staging3.lib.princeton.edu:30374

  debug:
    verbosity: basic

otel_service_pipelines:

  metrics:
    receivers:
      - mysql
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug
