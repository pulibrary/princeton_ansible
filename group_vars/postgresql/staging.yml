---
postgres_version: "15"
postgres_leader: "lib-postgres-staging1.princeton.edu"
db_clusteradmin_user: "postgres"
db_clusteradmin_password: "{{ vault_postgres_admin_password }}"
postgresql_settings:
  - name: port
    value: 5432
  - name: listen_addresses
    value: "*"
postgresql_ext_install_postgis: true
postgresql_databases:
  - name: postgres
postgresql_users:
  - name: postgres
    password: "{{ vault_postgres_admin_password }}"
    db: "postgres"
    priv: "ALL"
    role_attr_flags: "SUPERUSER"
postgresql_is_local: true
postgresadmin: "postgres"
postgres_admin_password: '{{ vault_postgres_admin_password }}'
postgres_port: 5432
postgres_admin_user: "{{ postgresadmin }}"
postgresql_log_path: "/var/lib/postgresql/{{ postgres_version }}/main/pg_log/pg.json"

postgresql_logrotate_rules:
  - name: "postgresql"
    paths:
      - "{{ postgresql_log_path }}"
    options:
      rotate: "14"
      maxsize: "2000"
      create_mode: "{{ logrotate_global_defaults.create_mode }}"
      create_owner: postgres
      create_group: postgres
      su_user: "{{ logrotate_global_defaults.su_user }}"
      su_group: "{{ logrotate_global_defaults.su_group }}"
# beyla
beyla_enabled: true
beyla_service_name: postgresql
beyla_environment: staging
beyla_otlp_endpoint: "http://127.0.0.1:4318"
beyla_otlp_protocol: "http/protobuf"
beyla_bpf_context_propagation: "all"

beyla_open_ports:
  - 5432

# signoz / otel collector for PostgreSQL
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: postgresql
  service.version: staging
  environment: staging
  deployment.environment: staging

otel_receivers:

  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

  filelog/postgresql-json:
    include:
      - /var/lib/postgresql/15/main/pg_log/pg.json

      - /var/lib/postgresql/15/main/pg_log/pg.json-[0-9]*
    exclude:
      - /var/lib/postgresql/15/main/pg_log/*.gz
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: json_parser
        id: parse_postgresql_json
        parse_from: body
        on_error: send

      - type: time_parser
        id: parse_postgresql_timestamp
        parse_from: attributes.timestamp
        layout_type: strptime
        layout: '%Y-%m-%d %H:%M:%S.%L %Z'
        on_error: send

      - type: severity_parser
        id: parse_postgresql_severity
        parse_from: attributes.error_severity
        mapping:
          debug:
            - DEBUG
            - DEBUG1
            - DEBUG2
            - DEBUG3
            - DEBUG4
            - DEBUG5
          info:
            - LOG
            - INFO
            - NOTICE
          warn:
            - WARNING
          error:
            - ERROR
          fatal:
            - FATAL
            - PANIC
        on_error: send

      - type: move
        id: move_postgresql_message_to_body
        from: attributes.message
        to: body
        on_error: send

      - type: add
        field: attributes.log_type
        value: postgresql_json

      - type: add
        field: attributes.service_name
        value: postgresql

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-staging1.lib.princeton.edu:30374
          - k8s-staging2.lib.princeton.edu:30374
          - k8s-staging3.lib.princeton.edu:30374

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/postgresql-json
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
