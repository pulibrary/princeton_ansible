---
ruby_version_override: "ruby2.6"

bundler_version: "2.2.4"

postgres_host: 'lib-postgres3.princeton.edu'
postgresql_is_local: false
postgres_version: 10

passenger_ruby: "/usr/bin/ruby2.6"
passenger_server_name: "appdeploy-staging1.princeton.edu"
passenger_app_root: "/opt/heaven/current/public"
passenger_app_env: "staging"

rails_app_env: "{{passenger_app_env}}"
rails_app_name: "heaven"
rails_app_directory: "{{rails_app_name}}"

application_db_name: 'heaven_staging'
application_dbuser_name: '{{vault_heaven_staging_db_user}}'
application_dbuser_password: '{{vault_heaven_staging_db_password}}'
application_host: '{{passenger_server_name}}'
application_host_protocol: 'https'
application_dbuser_role_attr_flags: 'SUPERUSER'

project_db_host: '{{postgres_host}}'

rails_app_vars:
  - name: APPLICATION_HOST
    value: '{{application_host}}'
  - name: APPLICATION_HOST_PROTOCOL
    value: '{{application_host_protocol}}'

  - name: DATABASE_URL
    value: '{{heaven_staging_database_url}}'
  - name: GITHUB_TOKEN
    value: '{{vault_heaven_staging_secret_github_token}}'
  - name: GITHUB_CLIENT_ID
    value: '{{vault_heaven_staging_secret_github_client_id}}'
  - name: GITHUB_CLIENT_SECRET
    value: '{{vault_heaven_staging_secret_github_client_secret}}'
  - name: GITHUB_TEAM_ID
    value: '{{vault_heaven_staging_secret_github_team_id}}'
  - name: RAILS_SECRET_KEY_BASE
    value: '{{vault_heaven_staging_secret_key}}'
  - name: DEPLOYMENT_PRIVATE_KEY
    value: '{{vault_heaven_staging_deployment_private_key}}'
  - name: DEPLOYMENT_TIMEOUT
    value: '3600'

  - name: SLACK_BOT_NAME
    value: '{{vault_heaven_staging_slack_bot_name}}'
  - name: SLACK_WEBHOOK_URL
    value: '{{vault_heaven_staging_slack_webhook_url}}'

redis__server_default_configuration:
  syslog-enabled: "{{ redis__server_syslog | bool }}"
  syslog-ident: "{{ redis__server_syslog_ident }}"
  syslog-facility: "{{ redis__server_syslog_facility }}"
  loglevel: "{{ redis__server_loglevel }}"
  bind: "{{ redis__server_bind }}"
  port: "{{ redis__server_port }}"
  save: "{{ redis__server_save }}"
  maxmemory: "{{ redis__server_maxmemory }}"
  maxmemory-policy: "{{ redis__server_maxmemory_policy }}"
  maxmemory-samples: "{{ redis__server_maxmemory_samples }}"
