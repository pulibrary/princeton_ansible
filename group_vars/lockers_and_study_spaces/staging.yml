---
postgres_host: 'lib-postgres-staging1.princeton.edu'
postgresql_is_local: false
postgres_version: 15
postgres_admin_user: "postgres"
pg_hba_contype: "host"
pg_hba_postgresql_user: "all"
pg_hba_postgresql_database: "all"
pg_hba_method: "md5"
pg_hba_source: "{{ ansible_host }}/32"
postgres_is_local: false
passenger_server_name: "lockers-and-study-spaces-staging2.princeton.edu"
passenger_app_env: "staging"
lockers_secret_key_base: '{{ vault_staging_lockers_and_study_spaces_secret_key_base }}'
postgres_admin_password: '{{ vault_postgres_admin_password }}'
app_db_host: '{{ postgres_host }}'
app_db_name: '{{ vault_lockers_and_study_spaces_staging_db_name }}'
app_db_user: '{{ vault_lockers_and_study_spaces_staging_db_user }}'
app_db_password: '{{ vault_lockers_and_study_spaces_staging_db_password }}'
app_secret_key: '{{ vault_lockers_and_study_spaces_staging_secret_key }}'
rails_app_env: "staging"
application_db_name: '{{ app_db_name }}'
application_dbuser_name: '{{ app_db_user }}'
application_dbuser_password: '{{ app_db_password }}'
application_dbuser_role_attr_flags: 'CREATEDB'
app_host_name: 'lockers_and_study_spaces_staging.princeton.edu'
application_host_protocol: 'https'
running_on_server: true
install_mailcatcher: true
mailcatcher_user: 'pulsys'
mailcatcher_group: 'pulsys'
lockers_honeybadger_key: '{{ vault_lockers_and_study_spaces_honeybadger_key }}'
# beyla
beyla_enabled: true
beyla_service_name: tigerdata
beyla_environment: staging
beyla_otlp_endpoint: "http://127.0.0.1:4318"
beyla_otlp_protocol: "http/protobuf"
beyla_bpf_context_propagation: "all"

beyla_open_ports:
  - 80

# signoz
otel_default_resource_attributes:
  host.name: "{{ inventory_hostname }}"
  service.name: lockers
  service.version: staging
  environment: staging

otel_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318
  filelog/nginx-access:
    include: ["/var/log/nginx/access.log*"]
    start_at: end
    operators:
      - type: regex_parser
        regex: '^(?P<remote_addr>[^\s]+) \((?P<remote_user>[^)]*)\) - - \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
        parse_from: body
      - type: time_parser
        parse_from: attributes.time_local
        layout_type: strptime
        layout: '%d/%b/%Y:%H:%M:%S %z'
      - type: add
        field: attributes.log_type
        value: "lockers_access"
      - type: add
        field: attributes.service_name
        value: lockers_access

  filelog/nginx-error:
    include: ["/var/log/nginx/error.log*"]
    start_at: end
    operators:
      - type: add
        field: attributes.log_type
        value: "lockers_error"
      - type: add
        field: attributes.service_name
        value: "lockers"

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}

otel_processors:
  batch:
    send_batch_max_size: 1024
    send_batch_size: 512
    timeout: 30s

otel_exporters:
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 10s
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    resolver:
      static:
        hostnames:
          - k8s-staging1.lib.princeton.edu:32317
          - k8s-staging2.lib.princeton.edu:32317
          - k8s-staging3.lib.princeton.edu:32317

  debug:
    verbosity: basic

otel_service_pipelines:
  logs:
    receivers:
      - filelog/nginx-access
      - filelog/nginx-error
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  metrics:
    receivers:
      - hostmetrics
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
      - debug

  traces:
    receivers:
      - otlp
    processors:
      - resource
      - batch
    exporters:
      - loadbalancing
