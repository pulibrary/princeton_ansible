---
- hosts: pdc_discovery_dev
  remote_user: pulsys
  become: true
  vars_files:
    - ../site_vars.yml
    - ../group_vars/pdc_discovery/dev.yml
    - ../group_vars/pdc_discovery/vault.yml

  roles:
    - role: roles/ruby
    - role: roles/deploy_user
    - role: roles/passenger
    - role: roles/redis
    - role: roles/postgresql
    - role: roles/nodejs
    - role: roles/rails_app
    # - {role: roles/solr, when: postgresql_is_local == true}
    # - { role: roles/dpul, rails_app_env: 'staging' }

  post_tasks:
    - name: tell everyone on slack you ran an ansible playbook
      slack:
        token: "{{ vault_pul_slack_token }}"
        msg: "{{ inventory_hostname }} completed"
        channel: #server-alerts
