---
# by default this playbook runs in the staging environment
# to run in production, pass '-e runtime_env=production'
# to update checkmk run with '-t update_checkmk'
#   for example: 'ansible-playbook playbooks/pdc_describe.yml -t update_checkmk'
- name: build the rails app for despositing research data
  hosts: pdc_describe_{{ runtime_env | default('staging') }}
  remote_user: pulsys
  become: true
  vars_files:
    - ../site_vars.yml
    - ../group_vars/pdc_describe/main.yml
    - ../group_vars/pdc_describe/{{ runtime_env | default('staging') }}.yml
    - ../group_vars/pdc_describe/vault.yml

  vars:
    post_install: |
      Possible Things left to do:
      - run a cap deploy for pdc_describe: https://github.com/pulibrary/pdc_describe

  roles:
#    - role: mailcatcher
    - role: ruby_app
    - role: otel_collector
#    - role: sidekiq_worker
#    - role: roles/clamav

  tasks:
    - name: Allow HTTP from libnet
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp
        src: "172.20.80.0/22"

    # This is a temporary workaround. We should re-write the nodejs role to support yarn 4, 
    # but in the meantime we need to set it manually here.
    - name: Set yarn 4
      ansible.builtin.command: "yarn set version berry"
      become: true

  post_tasks:
      - name: send information to slack
        ansible.builtin.include_tasks:
          file: utils/slack_tasks_end_of_playbook.yml
