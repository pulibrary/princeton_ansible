---
- name: Get info from vSphere
  hosts: localhost

  vars_files:
    - ../../group_vars/vsphere/vault.yml
    - ../../group_vars/vsphere/{{ runtime_env | default('staging') }}.yml

  tasks:
    - name: Gather info on templates
      community.vmware.vmware_vm_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        show_datacenter: true
        show_cluster: true
        show_esxi_hostname: true
        vm_type: template
      register: template_info

    - name: View template info
      ansible.builtin.debug:
        var: template_info

    - name: Gather memory stats on ESXi hosts
      community.vmware.vmware_host_facts:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        # esxi_hostname: "{{ item }}"
        esxi_hostname: "lib-vmserv001a-dev.princeton.edu"
        schema: vsphere
        properties:
          - summary.config.name
          - hardware.memorySize
          - summary.quickStats.overallMemoryUsage
      # loop:
      #   - lib-vmserv001a-dev.princeton.edu
      #   - lib-vmserv002a-dev.princeton.edu
      #   - lib-vmserv003a-dev.princeton.edu
      #   - lib-vmserv001b-dev.princeton.edu
      #   - lib-vmserv002b-dev.princeton.edu
      #   - lib-vmserv003b-dev.princeton.edu
      register: esxi_host_memory

    - name: View ESXi memory stats
      ansible.builtin.debug:
        var: esxi_host_memory
        # divide by 1073741824 to get gigabytes

    - name: View ESXi memory stats in GB
      ansible.builtin.debug:
        msg: The {{ esxi_host_memory.summary.config.name }} server is using {{ esxi_host_memory.quickstats.overallMemoryUsage | map('int') | map('human_readable','unit','G') }}
        # divide by 1073741824 to get gigabytes

    - name: Gather info on storage
      community.vmware.vmware_datastore_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        schema: vsphere
        properties:
          - info.name
          - info.freeSpace
      register: storage_info

    - name: View storage availability
      ansible.builtin.debug:
        var: storage_info
