---
- name: Get info on VEEAM backup tags from vSphere
  hosts: localhost

  vars_files:
    - ../../group_vars/vsphere/vault.yml
    - ../../group_vars/vsphere/{{ runtime_env | default('staging') }}.yml

  vars:
    - known_tagged_vm: "{{ tagged_vms.virtual_machines | selectattr('guest_name', 'equalto', 'dss-staging1') }}"
    # the formulation below works, but returns only the 'tags' dicts
    # we need to see the name of the VM and eventually the disk space
    # - fake_wed_vms: "{{ tagged_vms.virtual_machines | map(attribute='tags') | flatten | selectattr('name', 'equalto', 'Fake_Wed_A') }}"

  tasks:
    - name: Gather info on tags and storage
      community.vmware.vmware_vm_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        show_tag: true
        show_allocated: true
        vm_type: vm
      register: tagged_vms

    - name: View full variable
      ansible.builtin.debug:
        var: tagged_vms

    - name: view known tagged VM
      ansible.builtin.debug:
        var: known_tagged_vm

    - name: view all tags with mapped vars
      ansible.builtin.debug:
        msg: "{{ tagged_vms.virtual_machines | map(attribute='tags') | flatten | map(attribute='name') }}"

    - name: Display VMs that have tags
      ansible.builtin.debug:
        var: item
      loop: "{{ tagged_vms | community.general.json_query(not_null) }}"
      vars:
        not_null: "virtual_machines[?not_null(tags)]"
      # this returns the correct list of 4 VMs - huzzah!
