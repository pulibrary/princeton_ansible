---
- name: Get info on VEEAM backup tags from vSphere
  hosts: localhost

  vars_files:
    - ../../group_vars/vsphere/vault.yml
    - ../../group_vars/vsphere/{{ runtime_env | default('staging') }}.yml

  vars:
    backup_tags:
      - Fake_Wed_A
      - Fake_Tue_A

  tasks:
    - name: Gather info on tags and storage
      community.vmware.vmware_vm_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        show_tag: true
        show_allocated: true
        vm_type: vm
      register: vms_and_tags

    - name: View full variable
      ansible.builtin.debug:
        var: vms_and_tags

    - name: view all tags with mapped vars
      ansible.builtin.debug:
        msg: "{{ vms_and_tags.virtual_machines | map(attribute='tags') | flatten | map(attribute='name') }}"

    - name: Display VMs that have tags
      ansible.builtin.debug:
        var: item
      loop: "{{ vms_and_tags | community.general.json_query(not_null) }}"
      vars:
        not_null: "virtual_machines[?not_null(tags)]"
      # this returns the correct list of 4 VMs - huzzah!
      register: tagged_vms

    - name: what do tagged_vms look like?
      ansible.builtin.debug:
        var: tagged_vms

    - name: create a dict of fields we want
      ansible.builtin.set_fact:
        # build a list of VMs with tags, names, and disk size
        slim_tagged_vms: "{{ tagged_vms | community.general.json_query('results[*].item.{VM_name: guest_name, Tag_name: tags[0].name, Disk_size: allocated.storage}') }}"

    - name: look at slim_tagged_vms
      ansible.builtin.debug:
        var: slim_tagged_vms

    - name: get disk size for tagged VMs
      ansible.builtin.set_fact:
        matched_disks: "{{ slim_tagged_vms | json_query(disk_size_match_to_tag) }}"
      vars:
        disk_size_match_to_tag: '[?Tag_name==`{{ item }}`].Disk_size'
      loop: "{{ backup_tags }}"
      register: matched_disks_dict

    # probably don't need this
    # - name: get VM names for tagged VMs
    #   ansible.builtin.set_fact:
    #     matched_vms: "{{ slim_tagged_vms | json_query(name_match_to_tag) }}"
    #   vars:
    #     name_match_to_tag: '[?Tag_name==`{{ item }}`].VM_name'
    #   loop: "{{ backup_tags }}"
    #   register: matched_vms_dict

    - name: look at matched_disks
      ansible.builtin.debug:
        var: matched_disks_dict

    # this returned "The VMs marked ['Fake_Wed_A', 'Fake_Tue_A'] have 0.00 Bytes\" disk size"
    # - name: get a list of matched disk sizes
    #   ansible.builtin.debug:
    #     msg: The VMs marked {{ matched_disks_dict.results | map(attribute='item') }} have {{ matched_disks_dict.results | map(attribute='ansible_facts.matched_disks') | list | int | human_readable }}" disk size

    # probably don't need this
    # - name: look at matched_vms
    #   ansible.builtin.debug:
    #     var: matched_vms_dict

    - name: show data for tagged VMs - JSON query
      ansible.builtin.debug:
        msg: The {{ item }} tag is on these VMs {{ slim_tagged_vms | json_query(name_match_to_tag) }} and {{ slim_tagged_vms | json_query(disk_size_match_to_tag) }} total disk
      vars:
        name_match_to_tag: '[?Tag_name==`{{ item }}`].VM_name'
        disk_size_match_to_tag: '[?Tag_name==`{{ item }}`].Disk_size'
      loop: "{{ backup_tags }}"

    - name: show data for tagged VMs - filters
      ansible.builtin.debug:
        msg:
          - The {{ item }} tag marks these VMs {{ slim_tagged_vms | selectattr('Tag_name', 'equalto', item) | map(attribute='VM_name') }}
          - which have disk sizes of {{ slim_tagged_vms | selectattr('Tag_name', 'equalto', item) | map(attribute='Disk_size') }}
          - the total size of the {{ item }} backup is {{ slim_tagged_vms | selectattr('Tag_name', 'equalto', item) | map(attribute='Disk_size') | sum | human_readable }}
      loop: "{{ backup_tags }}"

    - name: all VMs tagged {{ item }}
      ansible.builtin.debug:
        msg: The {{ item }} tag is on these VMs {{ slim_tagged_vms | json_query(name_match_to_tag) }} and {{ slim_tagged_vms | json_query(disk_size_match_to_tag) | int | human_readable }} total disk
      vars:
        name_match_to_tag: '[?Tag_name==`{{ item }}`].VM_name'
        disk_size_match_to_tag: '[?Tag_name==`{{ item }}`].Disk_size'
      loop: "{{ backup_tags }}"
