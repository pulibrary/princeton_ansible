---
- name: Get info on VEEAM backup tags from vSphere
  hosts: localhost

  vars_files:
    - ../../group_vars/vsphere/vault.yml
    - ../../group_vars/vsphere/{{ runtime_env | default('staging') }}.yml

  vars:
    - tags_not_empty: "{{ tagged_vms.virtual_machines | selectattr('tags', not, empty) }}"
    - map_flatten_selectattr: "{{ tagged_vms.virtual_machines | map(attribute='tags') | flatten | selectattr('name', 'equalto', 'Fake_Tue_A') }}"
    - dot_tags_selectattr: "{{ tagged_vms.virtual_machines.tags | selectattr('name', 'equalto', 'Fake_Tue_A') }}"
    - selectattr_with_tag_zero: "{{ tagged_vms.virtual_machines | selectattr('tags[0].name', 'equalto', 'Fake_Tue_A') }}"
    - selectattr_twice: "{{ tagged_vms.virtual_machines | selectattr('tags') | flatten | selectattr('name', 'equalto', 'Fake_Wed_A') }}"
    - known_tagged_vm: "{{ tagged_vms.virtual_machines | selectattr('guest_name', 'equalto', 'dss-staging1') }}"
    # the formulation below works, but returns only the 'tags' dicts
    # we need to see the name of the VM and eventually the disk space
    # - fake_wed_vms: "{{ tagged_vms.virtual_machines | map(attribute='tags') | flatten | selectattr('name', 'equalto', 'Fake_Wed_A') }}"

  tasks:
    - name: Gather info on tags and storage
      community.vmware.vmware_vm_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        show_tag: true
        show_allocated: true
      register: tagged_vms

    - name: View full variable
      ansible.builtin.debug:
        var: tagged_vms

    - name: view known tagged VM
      ansible.builtin.debug:
        var: known_tagged_vm

    - name: view all tags with mapped vars
      ansible.builtin.debug:
        msg: "{{ tagged_vms.virtual_machines | map(attribute='tags') | flatten | map(attribute='name') }}"

    - name: view tags_not_empty var
      ansible.builtin.debug:
        var: tags_not_empty
      ignore_errors: true

    - name: view map_flatten_selectattr var
      ansible.builtin.debug:
        var: map_flatten_selectattr
      ignore_errors: true

    - name: view dot_tags_selectattr var
      ansible.builtin.debug:
        var: dot_tags_selectattr
      ignore_errors: true

    - name: view selectattr_with_tag_zero var
      ansible.builtin.debug:
        var: selectattr_with_tag_zero
      ignore_errors: true

    - name: view selectattr_twice var
      ansible.builtin.debug:
        var: selectattr_twice
      ignore_errors: true

