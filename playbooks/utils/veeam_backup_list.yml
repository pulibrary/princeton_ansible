---
- name: Get info on VEEAM backup tags from vSphere
  hosts: localhost

  vars_files:
    - ../../group_vars/vsphere/vault.yml
    - ../../group_vars/vsphere/{{ runtime_env | default('staging') }}.yml

  tasks:
    - name: Gather info on tags and storage
      community.vmware.vmware_vm_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        show_tag: true
        show_allocated: true
      register: tagged_vms

    - name: View full variable
      ansible.builtin.debug:
        var: tagged_vms

    - name: View vms with tags
      ansible.builtin.debug:
        msg: The {{ tagged_vms.virtual_machines | map(attribute='guest_name') }} vm has {{ tagged_vms.virtual_machines | map(attribute='tags') }} for tags and {{ tagged_vms.virtual_machines | map(attribute='allocated.storage') }} allocated storage
      # when: item.guest_name == "dss-staging1"
      loop: "{{ tagged_vms.virtual_machines }}"
      when: "item.guest_name == dss-staging1"

    # - name: sample debug with json query
