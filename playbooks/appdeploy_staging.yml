---
- hosts: appdeploy_staging
  remote_user: pulsys
  become: true
  vars_files:
    - ../group_vars/appdeploy/staging.yml

  roles:
    - role: roles/nodejs
    - role: roles/heaven

  post_tasks:
    - name: tell everyone on slack you ran an ansible playbook
      slack:
        token: "{{ vault_pul_slack_token }}"
        msg: "{{ inventory_hostname }} completed"
        channel: #server-alerts
