---
- name: Ensure proquest user and SSH keys exist
  hosts: proquestdrop_{{ runtime_env | default('staging') }}
  remote_user: pulsys
  become: true

  vars:
    proquest_user: proquest
    proquest_uid: 1056
    proquest_group: proquest
    proquest_gid: 1056
    proquest_home: /pultheses/proquest
    proquest_shell: /usr/local/bin/zsh

  tasks:
    - name: Ensure zsh is installed
      community.general.pkgng:
        name: zsh
        state: present

    - name: Ensure proquest group exists
      ansible.builtin.group:
        name: "{{ proquest_group }}"
        gid: "{{ proquest_gid }}"
        state: present

    - name: Ensure proquest home parent exists
      ansible.builtin.file:
        path: /pultheses
        state: directory
        owner: root
        group: wheel
        mode: "0755"

    - name: Ensure proquest user exists
      ansible.builtin.user:
        name: "{{ proquest_user }}"
        uid: "{{ proquest_uid }}"
        group: "{{ proquest_group }}"
        home: "{{ proquest_home }}"
        shell: "{{ proquest_shell }}"
        comment: "User &"
        create_home: true
        state: present

    - name: Ensure proquest home permissions are correct
      ansible.builtin.file:
        path: "{{ proquest_home }}"
        state: directory
        owner: "{{ proquest_user }}"
        group: "{{ proquest_group }}"
        mode: "0750"

    - name: Ensure proquest .ssh directory exists
      ansible.builtin.file:
        path: "{{ proquest_home }}/.ssh"
        state: directory
        owner: "{{ proquest_user }}"
        group: "{{ proquest_group }}"
        mode: "0700"

    - name: Ensure proquest authorized_keys exists
      ansible.builtin.file:
        path: "{{ proquest_home }}/.ssh/authorized_keys"
        state: touch
        owner: "{{ proquest_user }}"
        group: "{{ proquest_group }}"
        mode: "0600"

    - name: Ensure ProQuest SSH keys are present
      ansible.builtin.blockinfile:
        path: "{{ proquest_home }}/.ssh/authorized_keys"
        owner: "{{ proquest_user }}"
        group: "{{ proquest_group }}"
        mode: "0600"
        marker: "# {mark} managed by Ansible - proquest SSH keys"
        block: |
          # proquest user
          ssh-rsa 
          ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDBkidevMWKVilh1NJNrcSszjXdRylLvU1+yTh68JAP/
          ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDBkidevMWKVilh1NJNrcSszjXdRylLvU1+yTh68JAP
          # Updated ProQuest Key as of 30 March 2023
          ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPiw1Q68UOL0choLTdAV2rj/nxm6qY3RZdXkBn4rlgYT ETD Admin Delivery

    - name: Ensure final AllowUsers block includes proquest
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} managed by Ansible (final AllowUsers)"
        block: |
          AllowUsers pulsys proquest
        validate: /usr/sbin/sshd -t -f %s
      notify: Reload sshd

  handlers:
    - name: Reload sshd
      ansible.builtin.service:
        name: sshd
        state: reloaded
